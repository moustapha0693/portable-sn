  function setProfileFromAccount(acc) {
    PROFILE = {
      fullName: acc.full_name || "",
      region: acc.region || REGIONS[0],
      quartier: acc.quartier || "",
      phone: acc.phone || "",
      token: acc.token || (PROFILE && PROFILE.token) || null, // jeton de session client
    };
    localStorage.setItem("psn_profile", JSON.stringify(PROFILE));
    if (window.psnNotif) window.psnNotif.refreshBadge(); // met à jour le compteur d'alertes
  }

  async function doLogin() {
    if (authBusy) return;
    const d = (($("#auth-phone") || {}).value || "").replace(/\D/g, "");
    const pin = (($("#auth-pin") || {}).value || "").trim();
    if (d.length !== 9) return toast("Numéro invalide (9 chiffres).");
    if (!/^\d{6}$/.test(pin)) return toast("Le mot de passe doit comporter 6 chiffres.");
    authBusy = true;
    const btn = $("[data-auth-login]"); if (btn) { btn.disabled = true; btn.textContent = "Connexion…"; }
    try {
      const { data, error } = await sb.rpc("connexion_client", { p_phone: d, p_pin: pin });
      if (error) { toast(error.message || "Connexion impossible."); return; }
      if (!data || data.ok === false) { toast((data && data.error) || "Numéro ou mot de passe incorrect."); return; }
      setProfileFromAccount(data); editingProfile = false;
      toast("Connecté ✓"); applyProfileUI(); renderProfile();
      if (pendingCheckout) { pendingCheckout = false; openCheckout(); }
    } catch (e) { console.error(e); toast("Connexion impossible."); }
    finally {
      authBusy = false;
      const b = $("[data-auth-login]"); if (b) { b.disabled = false; b.textContent = "Se connecter"; }
    }
  }

  async function doSignup() {
    if (authBusy) return;
    const name = (($("#pf-name") || {}).value || "").trim();
    const d = (($("#auth-phone") || {}).value || "").replace(/\D/g, "");
    const region = ($("#pf-region") || {}).value || REGIONS[0];
    let quartier = ($("#pf-quartier") || {}).value || "";
    if (quartier === "Autre") quartier = (($("#pf-quartier-autre") || {}).value || "").trim();
    const pin = (($("#auth-pin") || {}).value || "").trim();
    const pin2 = (($("#auth-pin2") || {}).value || "").trim();
    if (!name) return toast("Indique ton nom complet.");
    if (d.length !== 9) return toast("Numéro invalide (9 chiffres).");
    if (!quartier) return toast("Indique ton quartier.");
    if (!/^\d{6}$/.test(pin)) return toast("Le mot de passe doit comporter 6 chiffres.");
    if (pin !== pin2) return toast("Les deux mots de passe ne correspondent pas.");
    authBusy = true;
    const btn = $("[data-auth-signup]"); if (btn) { btn.disabled = true; btn.textContent = "Création…"; }
    try {
      const { data, error } = await sb.rpc("inscription_client",
        { p_phone: d, p_pin: pin, p_full_name: name, p_region: region, p_quartier: quartier });
      if (error) {
        if (/existe déjà/i.test(error.message || "")) {
          authMode = "login"; renderProfile();
          const p = $("#auth-phone"); if (p) p.value = d;
          toast("Ce numéro a déjà un compte. Connecte-toi.");
        } else toast(error.message || "Inscription impossible.");
        return;
      }
      setProfileFromAccount(data); editingProfile = false;
      toast("Compte créé ✓"); applyProfileUI(); renderProfile();
      if (pendingCheckout) { pendingCheckout = false; openCheckout(); }
    } catch (e) { console.error(e); toast("Inscription impossible."); }
    finally {
      authBusy = false;
      const b = $("[data-auth-signup]"); if (b) { b.disabled = false; b.textContent = "Créer mon compte"; }
    }
  }

  /* ===== Navigation entre vues ===== */
  function go(view) {
    $$(".view").forEach((v) => v.classList.toggle("active", v.id === "view-" + view));
    $$(".nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.go === view));
    if (view === "panier") renderCart();
    if (view === "favoris") renderFavs();
    if (view === "compte") renderProfile();
    if (view === "mescommandes") { store.prevView = "compte"; loadMyOrders(); }
    if (view === "notifications") psnNotif.open();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
  function isView(name) { const el = $("#view-" + name); return el && el.classList.contains("active"); }
  function currentView() {
    const v = $$(".view").find((s) => s.classList.contains("active"));
    return v ? v.id.replace("view-", "") : "accueil";
  }

  /* ===== Fiche produit ===== */
  function openProduct(pid) {
    const p = byId(pid); if (!p) return;
    if (!isView("produit")) store.prevView = currentView();
    const def = variantById(p.defaultVariantId) || p.variants[0] || {};
    store.detail = {
      pid, color: def.color || null, storage: def.storage || null,
      variantId: def.id || null, img: p.images[0] || null,
    };
    renderProduct();
    go("produit");
  }

  // Résout la variante affichée à partir de la sélection (couleur/capacité ou modèle).
  function resolveVariant(p) {
    const colors = [...new Set(p.variants.map((v) => v.color).filter(Boolean))];
    const storages = [...new Set(p.variants.map((v) => v.storage).filter(Boolean))];
    if (colors.length || storages.length) {
      return p.variants.find((v) =>
               (!colors.length || v.color === store.detail.color) &&
               (!storages.length || v.storage === store.detail.storage))
          || p.variants.find((v) => (!colors.length || v.color === store.detail.color))
          || p.variants[0];
    }
    return p.variants.find((v) => v.id === store.detail.variantId) || p.variants[0];
  }

  function selectColor(c) {
    const p = byId(store.detail.pid); if (!p) return;
    store.detail.color = c;
    const storagesForColor = [...new Set(p.variants.filter((v) => v.color === c).map((v) => v.storage).filter(Boolean))];
    if (storagesForColor.length && !storagesForColor.includes(store.detail.storage)) store.detail.storage = storagesForColor[0];
    renderProduct();
  }
  function selectStorage(s) { store.detail.storage = s; renderProduct(); }
  function selectModel(vid) {
    const v = variantById(vid); if (!v) return;
    store.detail.variantId = vid; store.detail.color = v.color; store.detail.storage = v.storage;
    renderProduct();
  }

  function renderProduct() {
    const p = byId(store.detail.pid); if (!p) return;
    const v = resolveVariant(p) || {};
    store.detail.variantId = v.id || null;
    const isFav = store.favs.includes(p.id);
    const out = !(v.stock > 0);
    const discount = v.oldPrice ? Math.round((1 - v.price / v.oldPrice) * 100) : 0;

    // Galerie
    const cur = store.detail.img && p.images.includes(store.detail.img) ? store.detail.img : (p.images[0] || null);
    const mainHtml = cur
      ? `<img id="pd-main-img" src="${cur}" alt="${esc(p.brand)} ${esc(p.name)}" onerror="this.outerHTML=window.psnPlaceholder('${p.category}')">`
      : `<div class="pd-main-ph">${mediaSvg(p.category)}</div>`;
    const thumbs = p.images.length > 1
      ? `<div class="pd-thumbs">${p.images.map((u) =>
          `<button class="pd-thumb ${u === cur ? "active" : ""}" data-thumb="${u}"><img src="${u}" alt="" loading="lazy" onerror="this.style.opacity=.3"></button>`).join("")}</div>`
      : "";

    // Sélecteurs de variantes (couleur / capacité, ou modèle générique)
    const colors = [...new Set(p.variants.map((x) => x.color).filter(Boolean))];
    const storages = [...new Set(p.variants.map((x) => x.storage).filter(Boolean))];
    let selectors = "";
    if (colors.length) {
      selectors += `<div class="vgroup"><div class="vlabel">Couleur</div><div class="vchips">` +
        colors.map((c) => `<button class="vchip ${c === store.detail.color ? "active" : ""}" data-vcolor="${esc(c)}">${esc(c)}</button>`).join("") +
        `</div></div>`;
    }
    if (storages.length) {
      const avail = colors.length
        ? new Set(p.variants.filter((x) => x.color === store.detail.color).map((x) => x.storage))
        : new Set(storages);
      selectors += `<div class="vgroup"><div class="vlabel">Capacité</div><div class="vchips">` +
        storages.map((s) => {
          const ok = avail.has(s);
          return `<button class="vchip ${s === store.detail.storage ? "active" : ""} ${ok ? "" : "off"}" ${ok ? `data-vstorage="${esc(s)}"` : "disabled"}>${esc(s)}</button>`;
        }).join("") + `</div></div>`;
    }
    if (!colors.length && !storages.length && p.variants.length > 1) {
      selectors += `<div class="vgroup"><div class="vlabel">Modèle</div><div class="vchips">` +
        p.variants.map((x) => `<button class="vchip ${x.id === v.id ? "active" : ""}" data-vmodel="${x.id}">${esc(x.label || "Variante")}</button>`).join("") +
        `</div></div>`;
    }

    const stockHtml = out
      ? `<div class="stock out"><span class="ic-dot"></span> Rupture de stock</div>`
      : (v.stock <= 5
          ? `<div class="stock"><span class="ic-dot"></span> ${v.stock} en stock</div>`
          : `<div class="stock" style="color:var(--green)"><span class="ic-dot"></span> En stock</div>`);
    let badge = "";
    if (discount > 0) badge = `<span class="tag promo">-${discount}%</span>`;
    else if (p.tag === "hot") badge = `<span class="tag hot">HOT</span>`;
    const rating = p.ratingCount > 0
      ? `<div class="pd-rating">★ ${Number(p.rating).toFixed(1)} <span>(${p.ratingCount})</span></div>` : "";

    $("#view-produit").innerHTML = `
      <button class="pd-back" data-back aria-label="Retour">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Retour
      </button>
      <div class="pd-gallery">
        <div class="pd-main">${badge}${mainHtml}</div>
        ${thumbs}
      </div>
      <div class="pd-info">
        <div class="brand">${esc(p.brand)}</div>
        <h1 class="pd-name">${esc(p.name)}</h1>
        ${rating}
        <div class="pd-price-row">
          <span class="pd-price">${fmt(v.price || p.price)}</span>
          ${v.oldPrice ? `<span class="pd-old">${fmt(v.oldPrice)}</span>` : ""}
        </div>
        ${stockHtml}
        ${selectors}
        ${p.description ? `<p class="pd-desc">${esc(p.description)}</p>` : ""}
        <div class="pd-actions">
          <button class="order-btn pd-add" data-order="${out ? "" : v.id}" ${out ? "disabled" : ""}>
            ${out ? "INDISPONIBLE" : `<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg> Commander`}
          </button>
          <button class="pd-fav ${isFav ? "on" : ""}" data-fav="${p.id}" aria-label="Favori">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="${isFav ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6z"/></svg>
          </button>
        </div>
      </div>`;
  }

  /* ===== Toast ===== */
  let toastTimer;
  function toast(msg) {
    const t = $("#toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
  }

  /* ===== Écouteurs ===== */
  // Délégation de clics globale
  document.addEventListener("click", (e) => {
    const t = e.target.closest(
      "[data-add],[data-fav],[data-inc],[data-dec],[data-del],[data-go],[data-cat]," +
      "[data-open],[data-back],[data-vcolor],[data-vstorage],[data-vmodel],[data-thumb]," +
      "[data-checkout],[data-pay],[data-order],[data-profil-save],[data-profil-edit],[data-profil-logout]," +
      "[data-auth-login],[data-auth-signup],[data-auth-switch],[data-mo],[data-mo-back],[data-account-login],[data-notif-del],#submit-order");
    if (!t) return;
    if (t.dataset.notifDel) psnNotif.del(t.dataset.notifDel);
    else if (t.hasAttribute("data-account-login")) goToAccountLogin();
    else if (t.dataset.mo) openMyOrder(t.dataset.mo);
    else if (t.hasAttribute("data-mo-back")) { myOrderView = "list"; renderMyOrders(); }
    else if (t.hasAttribute("data-profil-save")) saveProfile();
    else if (t.hasAttribute("data-profil-edit")) { editingProfile = true; renderProfile(); }
    else if (t.hasAttribute("data-profil-logout")) logoutProfile();
    else if (t.hasAttribute("data-auth-login")) doLogin();
    else if (t.hasAttribute("data-auth-signup")) doSignup();
    else if (t.hasAttribute("data-auth-switch")) { authMode = t.getAttribute("data-auth-switch"); renderProfile(); }
    else if (t.dataset.order) orderNow(t.dataset.order);
    else if (t.dataset.add) addToCart(t.dataset.add);
    else if (t.dataset.fav) toggleFav(t.dataset.fav);
    else if (t.dataset.inc) changeQty(t.dataset.inc, +1);
    else if (t.dataset.dec) changeQty(t.dataset.dec, -1);
    else if (t.dataset.del) removeFromCart(t.dataset.del);
    else if (t.dataset.vcolor) selectColor(t.dataset.vcolor);
    else if (t.dataset.vstorage) selectStorage(t.dataset.vstorage);
    else if (t.dataset.vmodel) selectModel(t.dataset.vmodel);
    else if (t.dataset.thumb) { store.detail.img = t.dataset.thumb; renderProduct(); }
    else if (t.dataset.open) openProduct(t.dataset.open);
    else if (t.dataset.pay !== undefined && t.classList.contains("pay-option")) selectPayment(t);
    else if (t.id === "submit-order") submitOrder();
    else if (t.hasAttribute("data-checkout")) openCheckout();
    else if (t.hasAttribute("data-back")) go(store.prevView || "accueil");
    else if (t.dataset.go) go(t.dataset.go);
    else if (t.dataset.cat) { store.cat = t.dataset.cat; renderCats(); renderGrid(); go("accueil"); }
  });

  // Accès admin masqué : appui long (3 s) sur le logo -> fenêtre demandant le
  // numéro autorisé + le mot de passe. Le numéro doit figurer dans la liste des
  // accès (gérée par le propriétaire) ; l'email lié est résolu côté serveur, puis
  // la connexion est vérifiée par Supabase Auth. Aucun secret n'est écrit ici, et
  // la connexion admin de admin.html reste la vraie barrière.
  (function setupAdminGesture() {
    const logo = $("#logo");
    if (!logo) return;
    logo.style.userSelect = "none";
    logo.style.webkitUserSelect = "none";
    logo.style.cursor = "pointer";
    const norm = (v) => String(v == null ? "" : v).replace(/\D/g, "").slice(-9);

    let gate, phoneEl, passEl, errEl, okBtn;
    function buildGate() {
      gate = document.createElement("div");
      gate.className = "admin-gate";
      gate.innerHTML =
        '<div class="admin-gate-box">' +
          '<h3>Espace admin</h3>' +
          '<p>Saisis ton numéro et ton mot de passe.</p>' +
          '<input type="tel" inputmode="numeric" class="ag-phone" autocomplete="off" placeholder="Ton numéro" />' +
          '<input type="password" class="ag-pass" autocomplete="current-password" placeholder="Mot de passe" style="margin-top:8px" />' +
          '<div class="admin-gate-err"></div>' +
          '<div class="admin-gate-actions">' +
            '<button type="button" class="ag-cancel">Annuler</button>' +
            '<button type="button" class="ag-ok">Entrer</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(gate);
      phoneEl = gate.querySelector(".ag-phone");
      passEl = gate.querySelector(".ag-pass");
      errEl = gate.querySelector(".admin-gate-err");
      okBtn = gate.querySelector(".ag-ok");
      gate.querySelector(".ag-cancel").addEventListener("click", closeGate);
      gate.addEventListener("click", (e) => { if (e.target === gate) closeGate(); });
      okBtn.addEventListener("click", submitGate);
      const onEnter = (e) => { if (e.key === "Enter") submitGate(); };
      phoneEl.addEventListener("keydown", onEnter);
      passEl.addEventListener("keydown", onEnter);
    }
    function openGate() {
      if (!gate) buildGate();
      // Pré-remplit le numéro si un client est connecté (raccourci pour le propriétaire).
      phoneEl.value = (PROFILE && PROFILE.phone) ? norm(PROFILE.phone) : "";
      passEl.value = ""; errEl.textContent = "";
      phoneEl.classList.remove("err"); passEl.classList.remove("err");
      okBtn.disabled = false; okBtn.textContent = "Entrer";
      gate.classList.add("show");
      setTimeout(() => (phoneEl.value ? passEl : phoneEl).focus(), 50);
    }
    function closeGate() { if (gate) gate.classList.remove("show"); }
    function fail(msg, el) {
      errEl.textContent = msg;
      okBtn.disabled = false; okBtn.textContent = "Entrer";
      const target = el || passEl;
      target.classList.add("err"); target.focus(); target.select && target.select();
      setTimeout(() => target.classList.remove("err"), 350);
    }
    async function submitGate() {
      const phone = norm(phoneEl.value);
      const pwd = passEl.value.trim();
      if (phone.length !== 9) return fail("Numéro invalide (9 chiffres).", phoneEl);
      if (!pwd) return fail("Mot de passe requis.", passEl);
      okBtn.disabled = true; okBtn.textContent = "Vérification…"; errEl.textContent = "";
      try {
        // Propriétaire comme assistant : numéro + mot de passe boutique -> pont
        // serveur -> session admin. Un seul mot de passe (celui d'inscription).
        const { data: br, error: be } = await sb.functions.invoke("assistant-login", { body: { phone: phone, pin: pwd } });
        if (be || !br) return fail("Connexion impossible. Réessaie.");
        if (!br.ok) return fail(br.error || "Accès refusé.", /num/i.test(br.error || "") ? phoneEl : passEl);
        const { error: ve } = await sb.auth.verifyOtp({ token_hash: br.token_hash, type: "magiclink" });
        if (ve) return fail("Connexion impossible. Réessaie.");
        // Double contrôle du rôle admin, puis ouverture.
        const { data: isAdmin, error: e2 } = await sb.rpc("is_admin");
        if (e2 || !isAdmin) { await sb.auth.signOut(); return fail("Accès refusé."); }
        window.location.href = "admin.html";
      } catch (_) { fail("Connexion impossible. Réessaie."); }
    }

    let timer = null;
    const cancelHold = () => {
      if (timer) { clearTimeout(timer); timer = null; }
      logo.classList.remove("logo-hold");
    };
    const startHold = (e) => {
      if (e && e.type === "pointerdown" && e.button !== undefined && e.button !== 0) return;
      cancelHold();
      logo.classList.add("logo-hold");
      timer = setTimeout(() => { cancelHold(); openGate(); }, 3000);
    };
    logo.addEventListener("pointerdown", startHold);
    logo.addEventListener("pointerup", cancelHold);
    logo.addEventListener("pointerleave", cancelHold);
    logo.addEventListener("pointercancel", cancelHold);
  })();

  // Centre de notifications interne (web) — lit les alertes enregistrées en base.
  // Aucune dépendance push web : l'app mobile pourra plus tard ajouter un push
  // par-dessus, sans changer cette logique. Accès par jeton de session client.
  const psnNotif = (function () {
    let items = [];
    const tok = () => (PROFILE && PROFILE.token) ? PROFILE.token : null;

    const ICONS = {
      order_new: "🛒", order_status: "📦", low_stock: "📉",
      review: "⭐", promo: "🎁", message: "💬", info: "🔔",
    };
    function timeAgo(iso) {
      const d = new Date(iso), s = Math.floor((Date.now() - d.getTime()) / 1000);
      if (s < 60) return "à l'instant";
      if (s < 3600) return "il y a " + Math.floor(s / 60) + " min";
      if (s < 86400) return "il y a " + Math.floor(s / 3600) + " h";
      if (s < 604800) return "il y a " + Math.floor(s / 86400) + " j";
      return d.toLocaleDateString("fr-FR");
    }

    function setBadge(n) {
      const b = $("#notif-badge");
      if (b) { b.textContent = n ? (n > 99 ? "99+" : String(n)) : ""; b.dataset.count = n; }
      if (window.psnDesktop) psnDesktop.setNotifBadge(n);
    }
    async function refreshBadge() {
      const t = tok();
      if (!t) { setBadge(0); return; }
      try {
        const { data } = await sb.rpc("notifications_non_lues", { p_token: t });
        setBadge(Number(data) || 0);
      } catch (e) {}
    }

    function render() {
      const list = $("#notif-list"); if (!list) return;
      if (!tok()) {
        list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>'
          + '<p>Connecte-toi pour voir tes notifications.</p>'
          + '<button class="order-btn" data-go="compte" style="max-width:220px;margin:4px auto 0">Se connecter</button></div>';
        return;
      }
      if (!items.length) {
        list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><p>Aucune notification pour le moment.</p></div>';
        return;
      }
      list.innerHTML = items.map((n) => `
        <div class="notif-item ${n.is_read ? "" : "unread"}">
          <div class="notif-ic">${ICONS[n.type] || ICONS.info}</div>
          <div class="notif-main">
            <div class="notif-title">${esc(n.title)}</div>
            <div class="notif-msg">${esc(n.message)}</div>
            <div class="notif-time">${esc(timeAgo(n.created_at))}</div>
          </div>
          <button class="notif-del" data-notif-del="${n.id}" aria-label="Supprimer">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>`).join("");
    }

    async function open() {
      const list = $("#notif-list");
      const t = tok();
      if (!t) { render(); return; }
      if (list) list.innerHTML = '<p class="hint" style="text-align:center;padding:24px">Chargement…</p>';
      try {
        const { data, error } = await sb.rpc("mes_notifications", { p_token: t });
        if (error) throw error;
        items = data || [];
        render();
        if (items.some((n) => !n.is_read)) {
          await sb.rpc("notifications_marquer_lues", { p_token: t });
          items = items.map((n) => Object.assign({}, n, { is_read: true }));
        }
        refreshBadge();
      } catch (e) {
        if (list) list.innerHTML = '<p class="hint" style="text-align:center;padding:24px">Impossible de charger les notifications.</p>';
      }
    }

    async function del(id) {
      const t = tok(); if (!t) return;
      items = items.filter((n) => String(n.id) !== String(id));
      render();
      try { await sb.rpc("notification_supprimer", { p_token: t, p_id: Number(id) }); } catch (e) {}
      refreshBadge();
    }

    function clear() {
      items = [];
      const b = $("#notif-badge"); if (b) { b.textContent = ""; b.dataset.count = 0; }
      render();
    }

    return { open, refreshBadge, del, clear };
  })();
  window.psnNotif = psnNotif;

  /* ================= INTERFACE DESKTOP PREMIUM (module psnDesktop) =================
     Widgets: DesktopHeader / DesktopSidebar / DesktopGrid / DesktopProductCard /
     DesktopSmartPanel (Profile · Product · Cart · Notification · Favorites · Compare).
     Indépendant du mobile : ne lit/écrit que l'état partagé (store, PROFILE, PRODUCTS)
     et réutilise les actions existantes (addToCart, toggleFav, changeQty…). */
  const psnDesktop = (function () {
    let started = false;
    const F = { cats: new Set(), brands: new Set(), conds: new Set(), inStock: false, priceMax: Infinity, query: "" };
    let mode = "profile";            // profile | product | cart | notif | favoris | compare
    let curPid = null, curImg = null, ordersCount = null, priceCeil = 0, prevMode = "profile";
    const recent = [], compare = new Set();
    let notifItems = [];

    const $d = (id) => document.getElementById(id);
    const money = (n) => fmt(n);
    const uniq = (a) => [...new Set(a.filter(Boolean))];
    const heart = (on) => `<svg viewBox="0 0 24 24" width="18" height="18" fill="${on ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6z"/></svg>`;
    const toggleSet = (s, v, on) => { on ? s.add(v) : s.delete(v); };

    /* ---- Filtrage (état desktop indépendant du mobile) ---- */
    function dkFiltered() {
      const q = F.query.trim().toLowerCase();
      return PRODUCTS.filter((p) => {
        if (F.cats.size && !F.cats.has(p.category)) return false;
        if (F.brands.size && !F.brands.has(p.brand)) return false;
        if (F.conds.size && !(p.condition && F.conds.has(p.condition))) return false;
        if (F.inStock && !(p.stock > 0)) return false;
        if ((p.price || 0) > F.priceMax) return false;
        if (q && !((p.brand + " " + p.name).toLowerCase().includes(q))) return false;
        return true;
      });
    }

    /* ---- DesktopSidebar ---- */
    function buildSidebar() {
      const cats = CATEGORIES.filter((c) => c !== "Tous");
      const brands = uniq(PRODUCTS.map((p) => p.brand)).sort();
      const conds = uniq(PRODUCTS.map((p) => p.condition));
      priceCeil = Math.max(1, ...PRODUCTS.map((p) => p.price || 0));
      if (F.priceMax === Infinity) F.priceMax = priceCeil;
      const cCount = (c) => PRODUCTS.filter((p) => p.category === c).length;
      const bCount = (b) => PRODUCTS.filter((p) => p.brand === b).length;
      const opt = (name, set, val, cnt) =>
        `<label class="dk-fopt"><input type="checkbox" data-dkf="${name}" value="${esc(val)}" ${set.has(val) ? "checked" : ""}><span>${esc(val)}</span>${cnt != null ? `<span class="cnt">${cnt}</span>` : ""}</label>`;
      let h = `<div class="dk-fgroup"><h4>Catégories</h4>${cats.map((c) => opt("cat", F.cats, c, cCount(c))).join("")}</div>`;
      if (brands.length) h += `<div class="dk-fgroup"><h4>Marques</h4>${brands.map((b) => opt("brand", F.brands, b, bCount(b))).join("")}</div>`;
      h += `<div class="dk-fgroup"><h4>Prix maximum</h4><input type="range" id="dk-price" min="0" max="${priceCeil}" step="5000" value="${F.priceMax}"><div class="dk-price-val" id="dk-price-val">Jusqu'à ${money(F.priceMax)}</div></div>`;
      h += `<div class="dk-fgroup"><h4>Disponibilité</h4><label class="dk-fopt"><input type="checkbox" data-dkf="stock" ${F.inStock ? "checked" : ""}><span>En stock uniquement</span></label></div>`;
      if (conds.length) h += `<div class="dk-fgroup"><h4>État</h4>${conds.map((c) => opt("cond", F.conds, c)).join("")}</div>`;
      h += `<button class="dk-reset" id="dk-reset">Réinitialiser les filtres</button>`;
      $d("dk-sidebar").innerHTML = h;
    }
    function resetFilters() {
      F.cats.clear(); F.brands.clear(); F.conds.clear(); F.inStock = false; F.priceMax = priceCeil; F.query = "";
      const s = $d("dk-search-input"); if (s) s.value = "";
      buildSidebar(); renderGrid();
    }

    /* ---- DesktopProductCard ---- */
    function dkCard(p) {
      const isFav = store.favs.includes(p.id);
      const out = p.stock <= 0;
      const disc = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
      let badge = "";
      if (out) badge = '<span class="dk-cbadge out">Épuisé</span>';
      else if (disc > 0) badge = `<span class="dk-cbadge promo">-${disc}%</span>`;
      else if (p.tag === "hot") badge = '<span class="dk-cbadge hot">HOT</span>';
      const rating = p.ratingCount > 0
        ? `<div class="dk-crating">★ ${Number(p.rating).toFixed(1)} <span>(${p.ratingCount})</span></div>`
        : '<div class="dk-crating"><span>Nouveau</span></div>';
      const chk = compare.has(p.id);
      return `<article class="dk-card ${chk ? "sel" : ""}" data-dkopen="${p.id}">
        <div class="dk-cmedia">
          ${badge}
          <button class="dk-cfav ${isFav ? "on" : ""}" data-dkfav="${p.id}" aria-label="Favori">${heart(isFav)}</button>
          <label class="dk-ccmp" data-dkcmpwrap><input type="checkbox" data-dkcmp="${p.id}" ${chk ? "checked" : ""}> Comparer</label>
          ${mediaHtml(p)}
        </div>
        <div class="dk-cbody">
          <div class="dk-cseller">${esc(p.brand || "portable.sn")}</div>
          <div class="dk-cname">${esc(p.name)}</div>
          ${rating}
          <div class="dk-cprices"><span class="dk-cprice">${money(p.price)}</span>${p.oldPrice ? `<span class="dk-cold">${money(p.oldPrice)}</span>` : ""}</div>
          ${!out && p.defaultVariantId ? `<button class="dk-cadd" data-dkadd="${p.defaultVariantId}">Ajouter au panier</button>` : '<button class="dk-cadd dk-cadd-off" disabled>Indisponible</button>'}
        </div>
      </article>`;
    }

    /* ---- DesktopGrid ---- */
    function renderGrid() {
      const items = dkFiltered();
      $d("dk-cat-title").textContent = F.cats.size === 1 ? [...F.cats][0] : (F.query ? "Résultats" : "Catalogue");
      $d("dk-cat-count").textContent = items.length + (items.length > 1 ? " produits" : " produit");
      $d("dk-grid").innerHTML = items.length
        ? items.map(dkCard).join("")
        : '<div class="dk-empty" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><p>Aucun produit ne correspond à ces filtres.</p></div>';
    }

    /* ---- Smart Panel ---- */
    function wrap(title, body, back) {
      return `<div class="dk-panel">${back ? '<button class="dk-back" data-dkback>← Retour au profil</button>' : ""}${title ? `<div class="dk-ptitle">${title}</div>` : ""}${body}</div>`;
    }
    function renderSmart() {
      const s = $d("dk-smart-scroll"); if (!s) return;
      if (mode === "product") s.innerHTML = productPanel();
      else if (mode === "cart") s.innerHTML = cartPanel();
      else if (mode === "notif") s.innerHTML = notifPanel();
      else if (mode === "favoris") s.innerHTML = favPanel();
      else if (mode === "compare") s.innerHTML = comparePanel();
      else s.innerHTML = profilePanel();
      updateIcons();
    }
    function updateIcons() {
      const map = { favoris: "favoris", notifications: "notif", cart: "cart", profile: "profile" };
      document.querySelectorAll("#dk-header .dk-ic").forEach((b) => b.classList.toggle("active", map[b.getAttribute("data-dk")] === mode));
    }
    function setMode(m) { mode = m; renderSmart(); }
    function miniRow(x) {
      return `<div class="dk-mini" data-dkopen="${x.id}"><div class="dk-mini-img">${x.image ? `<img src="${x.image}" alt="">` : mediaSvg(x.category)}</div><div class="dk-mini-info"><div class="dk-mini-name">${esc(x.name)}</div><div class="dk-mini-sub">${esc(x.brand || "")}</div></div><div class="dk-mini-price">${money(x.price)}</div></div>`;
    }

    /* DesktopProfilePanel */
    const inpStyle = "width:100%;height:44px;border:1px solid var(--line);border-radius:10px;padding:0 12px;font-size:15px;background:var(--bg);color:var(--ink);margin-bottom:8px;box-sizing:border-box";
    function profilePanel() {
      const p = PROFILE;
      if (!p) {
        return wrap("", `<div class="dk-prof-head"><div class="dk-prof-av">?</div><div class="dk-prof-name">Bienvenue</div><div class="dk-prof-city">Connecte-toi à ton compte</div></div>
          <input id="dk-login-phone" type="tel" inputmode="numeric" placeholder="Numéro" style="${inpStyle}">
          <input id="dk-login-pin" type="password" placeholder="Mot de passe" style="${inpStyle}">
          <button class="dk-btn dk-btn-primary" data-dklogin>Se connecter</button>
          <p class="dk-mini-sub" style="text-align:center;margin-top:12px">Pas encore de compte ? Ajoute des produits au panier et commande sur WhatsApp.</p>`, false);
      }
      const initial = (p.fullName ? p.fullName.trim().charAt(0) : "?").toUpperCase();
      const city = esc([p.quartier, p.region].filter(Boolean).join(", ")) || "—";
      const recents = recent.map((id) => byId(id)).filter(Boolean).slice(0, 4);
      const promo = PRODUCTS.filter((x) => x.oldPrice && x.oldPrice > x.price).sort((a, b) => (1 - a.price / a.oldPrice) - (1 - b.price / b.oldPrice)).pop() || PRODUCTS.slice().sort((a, b) => (b.rating || 0) - (a.rating || 0))[0];
      if (ordersCount == null && p.token) loadOrders();
      let body = `<div class="dk-prof-head"><div class="dk-prof-av">${esc(initial)}</div><div class="dk-prof-name">${esc(p.fullName || "Client")}</div><div class="dk-prof-city">${city}</div></div>
        <div class="dk-stats"><div class="dk-stat"><b>${store.favs.length}</b><span>Favoris</span></div><div class="dk-stat"><b>${ordersCount == null ? "…" : ordersCount}</b><span>Commandes</span></div></div>`;
      if (recents.length) body += `<div class="dk-sec">Derniers produits consultés</div>` + recents.map(miniRow).join("");
      if (promo) body += `<div class="dk-sec">Promotion</div><div class="dk-promo" data-dkopen="${promo.id}" style="cursor:pointer"><b>${esc(promo.name)}</b><p>${promo.oldPrice ? `Économise ${money(promo.oldPrice - promo.price)} — ` : ""}${money(promo.price)}</p></div>`;
      body += `<button class="dk-btn dk-btn-ghost" data-dklogout style="margin-top:14px">Se déconnecter</button>`;
      return wrap("", body, false);
    }
    async function loadOrders() {
      try { const { data } = await sb.rpc("mes_commandes", { p_token: PROFILE.token }); ordersCount = (data || []).length; if (mode === "profile") renderSmart(); } catch (_) { ordersCount = 0; }
    }
    async function dkLogin() {
      const phone = (($d("dk-login-phone") || {}).value || "").replace(/\D/g, "");
      const pin = (($d("dk-login-pin") || {}).value || "").trim();
      if (phone.length !== 9) return toast("Numéro invalide (9 chiffres).");
      if (!/^\d{6}$/.test(pin)) return toast("Mot de passe à 6 chiffres.");
      try {
        const { data, error } = await sb.rpc("connexion_client", { p_phone: phone, p_pin: pin });
        if (error) return toast("Connexion impossible.");
        if (!data || data.ok === false) return toast((data && data.error) || "Identifiants incorrects.");
        setProfileFromAccount(data); applyProfileUI(); ordersCount = null; renderSmart(); refreshBadges();
        if (window.psnNotif) psnNotif.refreshBadge();
        toast("Connecté ✓");
      } catch (_) { toast("Connexion impossible."); }
    }

    /* DesktopProductPanel */
    function specRows(p) {
      const colors = uniq((p.variants || []).map((v) => v.color));
      const storages = uniq((p.variants || []).map((v) => v.storage));
      const rows = [["Marque", p.brand || "—"]];
      if (p.condition) rows.push(["État", p.condition]);
      if (storages.length) rows.push(["Stockage", storages.join(" / ")]);
      if (colors.length) rows.push(["Couleurs", colors.join(", ")]);
      rows.push(["Disponibilité", p.stock > 0 ? (p.stock <= 5 ? `Bientôt épuisé (${p.stock})` : "En stock") : "Rupture"]);
      if (p.ratingCount > 0) rows.push(["Note", `★ ${Number(p.rating).toFixed(1)} (${p.ratingCount})`]);
      rows.push(["Livraison", "Paiement à la livraison"]);
      return rows.map(([k, v]) => `<div class="dk-pp-spec"><span>${esc(k)}</span><span>${esc(v)}</span></div>`).join("");
    }
    function productPanel() {
      const p = byId(curPid); if (!p) return profilePanel();
      const imgs = (p.images && p.images.length) ? p.images : [];
      const cur = curImg && imgs.includes(curImg) ? curImg : (imgs[0] || null);
      const out = p.stock <= 0;
      const disc = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
      const main = cur ? `<img src="${cur}" alt="${esc(p.name)}">` : mediaSvg(p.category);
      const thumbs = imgs.length > 1 ? `<div class="dk-pp-thumbs">${imgs.map((u) => `<div class="dk-pp-thumb ${u === cur ? "active" : ""}" data-dkimg="${esc(u)}"><img src="${u}" alt=""></div>`).join("")}</div>` : "";
      const isFav = store.favs.includes(p.id);
      const body = `<div class="dk-pp-main">${main}${disc > 0 ? `<span class="dk-cbadge promo" style="top:12px;left:12px">-${disc}%</span>` : ""}</div>${thumbs}
        <div class="dk-pp-seller">${esc(p.brand || "portable.sn")}</div>
        <div class="dk-pp-name">${esc(p.name)}</div>
        <div class="dk-pp-prices"><span class="dk-pp-price">${money(p.price)}</span>${p.oldPrice ? `<span class="dk-pp-old">${money(p.oldPrice)}</span>` : ""}${disc > 0 ? `<span class="dk-pp-pbadge">-${disc}%</span>` : ""}</div>
        ${p.description ? `<p class="dk-pp-desc">${esc(p.description)}</p>` : ""}
        <div class="dk-sec">Caractéristiques</div>${specRows(p)}
        <div class="dk-pp-actions">
          ${out ? '<button class="dk-btn" disabled>Indisponible</button>' : `<div class="dk-two"><button class="dk-btn dk-btn-primary" data-dkadd="${p.defaultVariantId}">Ajouter au panier</button><button class="dk-btn dk-btn-buy" data-dkbuy="${p.defaultVariantId}">Acheter</button></div>`}
          <div class="dk-two"><button class="dk-btn dk-btn-wa" data-dkwa="${p.id}">WhatsApp</button><button class="dk-btn dk-btn-ghost" data-dkfav2="${p.id}">${isFav ? "♥ Favori" : "♡ Favori"}</button></div>
          <button class="dk-btn dk-btn-ghost" data-dkshare="${p.id}">Partager</button>
        </div>`;
      return wrap("", body, true);
    }

    /* DesktopCartPanel */
    function cartPanel() {
      const ids = Object.keys(store.cart);
      if (!ids.length) return wrap("Panier", `<div class="dk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg><p>Ton panier est vide.</p></div>`, false);
      let total = 0;
      const rows = ids.map((vid) => {
        const v = variantById(vid); if (!v) return "";
        const q = store.cart[vid]; total += v.price * q; const p = v.product;
        const lbl = v.label && v.label !== "Standard" ? ` · ${esc(v.label)}` : "";
        return `<div class="dk-mini"><div class="dk-mini-img">${p && p.image ? `<img src="${p.image}" alt="">` : mediaSvg(p && p.category)}</div>
          <div class="dk-mini-info"><div class="dk-mini-name">${esc(p ? p.name : "Produit")}${lbl}</div><div class="dk-mini-sub">${money(v.price)}</div></div>
          <div style="display:flex;align-items:center;gap:4px"><button class="dk-mini-x" data-dkdec="${vid}">–</button><b>${q}</b><button class="dk-mini-x" data-dkinc="${vid}">+</button><button class="dk-mini-x" data-dkdel="${vid}" title="Retirer">✕</button></div></div>`;
      }).join("");
      return wrap("Panier", rows + `<div class="dk-total"><span>Total</span><span>${money(total)}</span></div><button class="dk-btn dk-btn-wa" data-dkorder>Commander sur WhatsApp</button>`, false);
    }
    function orderWA() {
      const ids = Object.keys(store.cart); if (!ids.length) return;
      const lines = ["Bonjour, je souhaite commander :"]; let total = 0;
      ids.forEach((vid) => { const v = variantById(vid); if (!v) return; const q = store.cart[vid]; total += v.price * q; lines.push(`- ${v.product ? v.product.name : ""}${v.label && v.label !== "Standard" ? " (" + v.label + ")" : ""} x${q} = ${fmt(v.price * q)}`); });
      lines.push("Total : " + fmt(total));
      if (PROFILE && PROFILE.fullName) lines.push("Nom : " + PROFILE.fullName + (PROFILE.phone ? " (" + PROFILE.phone + ")" : ""));
      window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(lines.join("\n"))}`, "_blank");
    }

    /* DesktopNotificationPanel */
    function notifPanel() {
      if (!PROFILE || !PROFILE.token) return wrap("Notifications", `<div class="dk-empty"><p>Connecte-toi pour voir tes notifications.</p></div>`, false);
      setTimeout(loadNotifs, 0);
      return wrap("Notifications", `<div id="dk-notif-body"><p class="dk-empty">Chargement…</p></div>`, false);
    }
    async function loadNotifs() {
      if (!PROFILE || !PROFILE.token) return;
      try {
        const { data } = await sb.rpc("mes_notifications", { p_token: PROFILE.token });
        notifItems = data || [];
        const b = $d("dk-notif-body"); if (!b) return;
        b.innerHTML = notifItems.length ? notifItems.map((n) => `<div class="dk-mini ${n.is_read ? "" : "dk-notif-unread"}" style="align-items:flex-start"><div class="dk-mini-info"><div class="dk-mini-name" style="white-space:normal">${esc(n.title)}</div><div class="dk-mini-sub">${esc(n.message)}</div></div><button class="dk-mini-x" data-dknotifdel="${n.id}">✕</button></div>`).join("") : `<div class="dk-empty"><p>Aucune notification.</p></div>`;
        if (notifItems.some((n) => !n.is_read)) { await sb.rpc("notifications_marquer_lues", { p_token: PROFILE.token }); if (window.psnNotif) psnNotif.refreshBadge(); }
      } catch (_) {}
    }
    async function delNotif(id) {
      if (!PROFILE || !PROFILE.token) return;
      try { await sb.rpc("notification_supprimer", { p_token: PROFILE.token, p_id: Number(id) }); } catch (_) {}
      notifItems = notifItems.filter((n) => String(n.id) !== String(id)); loadNotifs();
    }

    /* DesktopFavoritesPanel */
    function favPanel() {
      const items = PRODUCTS.filter((p) => store.favs.includes(p.id));
      if (!items.length) return wrap("Favoris", `<div class="dk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6z"/></svg><p>Aucun favori pour l'instant.</p></div>`, false);
      return wrap("Favoris", items.map((x) => `<div class="dk-mini" data-dkopen="${x.id}"><div class="dk-mini-img">${x.image ? `<img src="${x.image}" alt="">` : mediaSvg(x.category)}</div><div class="dk-mini-info"><div class="dk-mini-name">${esc(x.name)}</div><div class="dk-mini-price">${money(x.price)}</div></div><button class="dk-mini-x" data-dkfav="${x.id}" title="Retirer">✕</button></div>`).join(""), false);
    }

    /* DesktopComparePanel */
    function toggleCompare(id) {
      if (compare.has(id)) compare.delete(id);
      else { if (compare.size >= 3) { toast("3 produits maximum en comparaison."); return; } compare.add(id); }
      renderGrid();
      if (compare.size >= 2) { if (mode !== "compare") prevMode = mode; mode = "compare"; renderSmart(); }
      else if (mode === "compare") { mode = prevMode === "compare" ? "profile" : prevMode; renderSmart(); }
    }
    function comparePanel() {
      const items = [...compare].map(byId).filter(Boolean);
      if (items.length < 2) { mode = "profile"; return profilePanel(); }
      const feats = [
        ["Prix", (p) => money(p.price)],
        ["Marque", (p) => p.brand || "—"],
        ["État", (p) => p.condition || "—"],
        ["Stockage", (p) => uniq((p.variants || []).map((v) => v.storage)).join(" / ") || "—"],
        ["Disponibilité", (p) => p.stock > 0 ? "✔" : "✕"],
        ["Note", (p) => p.ratingCount > 0 ? "★ " + Number(p.rating).toFixed(1) : "—"],
      ];
      const head = `<tr><th class="feat"></th>${items.map((p) => `<th>${p.image ? `<img src="${p.image}" alt="">` : ""}<div class="nm">${esc(p.name)}</div><button class="dk-mini-x" data-dkcmprm="${p.id}">retirer</button></th>`).join("")}</tr>`;
      const rows = feats.map(([k, fn]) => `<tr><td class="feat">${esc(k)}</td>${items.map((p) => `<td>${esc(String(fn(p)))}</td>`).join("")}</tr>`).join("");
      const bar = `<div class="dk-cmp-bar"><span>${items.length} produits comparés</span><button class="dk-cmp-clear" data-dkcmpclear>Tout effacer</button></div>`;
      return wrap("Comparaison", bar + `<table class="dk-cmp-table"><thead>${head}</thead><tbody>${rows}</tbody></table>`, false);
    }

    /* ---- Actions produit ---- */
    function openProduct(id) {
      curPid = id; curImg = null;
      const i = recent.indexOf(id); if (i >= 0) recent.splice(i, 1);
      recent.unshift(id); if (recent.length > 8) recent.length = 8;
      setMode("product");
    }
    function productWA(id) { const p = byId(id); if (!p) return; window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(`Bonjour, je suis intéressé par : ${p.name} (${fmt(p.price)}) — ${location.origin}`)}`, "_blank"); }
    function shareProduct(id) {
      const p = byId(id); if (!p) return;
      const url = location.origin + "/?p=" + encodeURIComponent(p.slug || p.id);
      if (navigator.share) navigator.share({ title: p.name, text: p.name, url }).catch(() => {});
      else if (navigator.clipboard) { navigator.clipboard.writeText(url); toast("Lien copié ✓"); }
      else toast(url);
    }

    /* ---- Badges & rafraîchissement ---- */
    function setBadgeEl(id, n) { const b = $d(id); if (!b) return; b.textContent = n ? (n > 99 ? "99+" : String(n)) : ""; b.dataset.count = n; }
    function refreshBadges() {
      if (!started) return;
      setBadgeEl("dk-cart-badge", Object.values(store.cart).reduce((a, b) => a + b, 0));
      setBadgeEl("dk-fav-badge", store.favs.length);
      const av = $d("dk-avatar"); if (av) av.textContent = (PROFILE && PROFILE.fullName ? PROFILE.fullName.trim().charAt(0) : "?").toUpperCase();
    }
    function setNotifBadge(n) { setBadgeEl("dk-notif-badge", Number(n) || 0); }
    function onDataChange() {
      if (!started) return;
      renderGrid(); refreshBadges();
      if (["favoris", "cart", "compare", "profile"].includes(mode)) renderSmart();
    }

    /* ---- Événements ---- */
    function wire() {
      const root = $d("desktop-app");
      $d("dk-logo").addEventListener("click", () => { resetFilters(); setMode("profile"); $d("dk-catalog").scrollTo({ top: 0, behavior: "smooth" }); });
      root.addEventListener("input", (e) => {
        if (e.target.id === "dk-search-input") { F.query = e.target.value; renderGrid(); }
        else if (e.target.id === "dk-price") { F.priceMax = Number(e.target.value); const v = $d("dk-price-val"); if (v) v.textContent = "Jusqu'à " + money(F.priceMax); renderGrid(); }
      });
      root.addEventListener("change", (e) => {
        const el = e.target; if (!el.matches("[data-dkf]")) return;
        const f = el.getAttribute("data-dkf");
        if (f === "cat") toggleSet(F.cats, el.value, el.checked);
        else if (f === "brand") toggleSet(F.brands, el.value, el.checked);
        else if (f === "cond") toggleSet(F.conds, el.value, el.checked);
        else if (f === "stock") F.inStock = el.checked;
        renderGrid();
      });
      root.addEventListener("click", (e) => {
        const cmp = e.target.closest("[data-dkcmpwrap]");
        if (cmp) { e.preventDefault(); e.stopPropagation(); toggleCompare(cmp.querySelector("[data-dkcmp]").getAttribute("data-dkcmp")); return; }
        if (e.target.closest("#dk-reset")) { resetFilters(); return; }
        const t = e.target.closest("[data-dk],[data-dkopen],[data-dkfav],[data-dkfav2],[data-dkadd],[data-dkbuy],[data-dkwa],[data-dkshare],[data-dkback],[data-dkinc],[data-dkdec],[data-dkdel],[data-dkorder],[data-dkimg],[data-dknotifdel],[data-dkcmprm],[data-dkcmpclear],[data-dklogin],[data-dklogout]");
        if (!t) return;
        if (t.hasAttribute("data-dk")) { const m = { favoris: "favoris", notifications: "notif", cart: "cart", profile: "profile" }[t.getAttribute("data-dk")]; setMode(m); }
        else if (t.dataset.dkopen) openProduct(t.dataset.dkopen);
        else if (t.dataset.dkfav) toggleFav(t.dataset.dkfav);
        else if (t.dataset.dkfav2) { toggleFav(t.dataset.dkfav2); renderSmart(); }
        else if (t.dataset.dkadd) { addToCart(t.dataset.dkadd); refreshBadges(); }
        else if (t.dataset.dkbuy) { addToCart(t.dataset.dkbuy); setMode("cart"); }
        else if (t.dataset.dkwa) productWA(t.dataset.dkwa);
        else if (t.dataset.dkshare) shareProduct(t.dataset.dkshare);
        else if (t.hasAttribute("data-dkback")) setMode("profile");
        else if (t.dataset.dkinc) { changeQty(t.dataset.dkinc, 1); renderSmart(); }
        else if (t.dataset.dkdec) { changeQty(t.dataset.dkdec, -1); renderSmart(); }
        else if (t.dataset.dkdel) { removeFromCart(t.dataset.dkdel); renderSmart(); }
        else if (t.hasAttribute("data-dkorder")) orderWA();
        else if (t.dataset.dkimg) { curImg = t.dataset.dkimg; renderSmart(); }
        else if (t.dataset.dknotifdel) delNotif(t.dataset.dknotifdel);
        else if (t.dataset.dkcmprm) toggleCompare(t.dataset.dkcmprm);
        else if (t.hasAttribute("data-dkcmpclear")) { compare.clear(); renderGrid(); setMode("profile"); }
        else if (t.hasAttribute("data-dklogin")) dkLogin();
        else if (t.hasAttribute("data-dklogout")) { logoutProfile(); ordersCount = null; refreshBadges(); setMode("profile"); }
      });
    }

    function start() {
      if (started) return; started = true;
      wire(); buildSidebar(); renderGrid(); refreshBadges(); setMode("profile");
      if (window.psnNotif) psnNotif.refreshBadge();
    }
    return { start, onDataChange, refreshBadges, setNotifBadge, openProduct };
  })();
  window.psnDesktop = psnDesktop;

  // Changements de sélecteurs (zone de livraison, région/quartier du profil)
  document.addEventListener("change", (e) => {
    const id = e.target && e.target.id;
    if (id === "ck-zone") {
      store.checkout.zoneId = Number(e.target.value) || null;
      updateCheckoutSummary();
    } else if (id === "pf-region") {
      onRegionChange();
    } else if (id === "pf-quartier") {
      onQuartierChange();
    }
  });

  // Recherche en direct
  $("#search").addEventListener("input", (e) => { store.query = e.target.value; renderGrid(); });
  $("#search-btn").addEventListener("click", () => { go("accueil"); $("#search").focus(); });

  // Bouton remonter
  const fabTop = $("#fab-top");
  window.addEventListener("scroll", () => {
    fabTop.classList.toggle("show", window.scrollY > 400);
  }, { passive: true });
  fabTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  /* ===== Application des paramètres (settings) ===== */
  function applySettings() {
    if (SETTINGS.whatsapp_number) WHATSAPP = String(SETTINGS.whatsapp_number).replace(/\D/g, "");
    if (SETTINGS.color_primary) document.documentElement.style.setProperty("--blue", SETTINGS.color_primary);
    if (SETTINGS.color_accent)  document.documentElement.style.setProperty("--green", SETTINGS.color_accent);
    $("#fab-wa").href = `https://wa.me/${WHATSAPP}?text=${encodeURIComponent("Bonjour " + (SETTINGS.store_name || "portable.sn") + " 👋")}`;
    $("#contact-phone").href = `https://wa.me/${WHATSAPP}`;
    $("#contact-phone").textContent = "+" + WHATSAPP;
  }

  /* ===== Mapping d'un produit Supabase vers la forme attendue par l'UI ===== */
  function mapProduct(p) {
    const variants = (p.variants || [])
      .filter((v) => v.is_active)
      .map((v) => ({
        id: v.id, label: v.label, color: v.color, storage: v.storage,
        attributes: v.attributes || {}, price: v.price,
        oldPrice: v.old_price || null, stock: v.stock_actuel ?? 0,
      }))
      .sort((a, b) => a.price - b.price);
    const images = (p.images || []).slice()
      .sort((a, b) => (b.is_primary ? 1 : 0) - (a.is_primary ? 1 : 0) || (a.position - b.position))
      .map((i) => i.url).filter(Boolean);
    const def = variants.find((v) => v.stock > 0) || variants[0] || {};
    const cover = images[0] || p.image_url || null;
    return {
      id: p.id,
      slug: p.slug,
      brand: p.brand || "",
      name: p.name,
      description: p.description || "",
      condition: p.condition || null,
      price: p.prix_base ?? def.price ?? 0,
      oldPrice: def.oldPrice || null,
      stock: p.stock_total ?? def.stock ?? 0,
      tag: p.is_hot ? "hot" : null,
      category: p.category ? p.category.name : null,
      image: cover,
      images,
      variants,
      defaultVariantId: def.id || null,
      rating: p.rating_avg || 0,
      ratingCount: p.rating_count || 0,
    };
  }

  /* ===== Chargement des données depuis Supabase ===== */
  async function loadCatalog() {
    const { data: st } = await sb.from("settings").select("*").limit(1).maybeSingle();
    if (st) SETTINGS = st;

    const { data: cats } = await sb.from("categories")
      .select("name,position,is_active").eq("is_active", true).order("position");
    CATEGORIES = ["Tous", ...(cats || []).map((c) => c.name)];

    const { data: zones } = await sb.from("delivery_zones")
      .select("id,name,fee,position,is_active").eq("is_active", true).order("position");
    ZONES = zones || [];

    const { data: prods, error } = await sb.from("products")
      .select("id,slug,name,brand,description,condition,is_hot,prix_base,stock_total,rating_avg,rating_count,image_url," +
              "category:categories(name)," +
              "variants:product_variants(id,label,color,storage,attributes,price,old_price,stock_actuel,is_active,position)," +
              "images:product_images(url,position,is_primary)")
      .eq("is_active", true)
      .order("created_at", { ascending: false });
    if (error) throw error;
    PRODUCTS = (prods || []).map(mapProduct);

    // Index global des variantes (résolution panier + fiche produit)
    VARIANTS = {};
    PRODUCTS.forEach((p) => p.variants.forEach((v) => { VARIANTS[v.id] = { ...v, product: p }; }));
  }

  /* ===== Démarrage ===== */
  async function init() {
    applySettings(); // liens WhatsApp par défaut immédiats
    applyProfileUI(); // reconnaissance du client si profil déjà enregistré
    psnNotif.refreshBadge(); // compteur d'alertes non lues si déjà connecté
    setInterval(() => psnNotif.refreshBadge(), 60000); // rafraîchit le badge périodiquement
    $("#grid").innerHTML =
      '<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px 0">Chargement du catalogue…</p>';
    try {
      await loadCatalog();
      applySettings(); // ré-applique avec les vrais paramètres
      renderCats();
      renderGrid();
      renderBadges();
      psnDesktop.start(); // active l'interface desktop (rendue visible seulement > 1200px)
    } catch (e) {
      console.error("Erreur de chargement Supabase:", e);
      $("#grid").innerHTML =
        '<p style="grid-column:1/-1;text-align:center;color:var(--red);padding:40px 0">Impossible de charger le catalogue. Vérifie ta connexion puis recharge la page.</p>';
      renderBadges();
    }
  }
  init();
})();
</script>
</body>
</html>
