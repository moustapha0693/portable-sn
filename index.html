<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#ffffff" />
<meta name="description" content="portable.sn — boutique de téléphones et accessoires au Sénégal. Livraison rapide, paiement à la livraison." />
<title>portable.sn — Boutique de téléphones au Sénégal</title>
<style>
  /* ============================================================
     portable.sn — boutique e-commerce mono-fichier (sans framework)
     Tout est ici : styles, données produits et logique JS.
     ============================================================ */
  :root {
    --blue: #2563eb;
    --blue-dark: #1e3a8a;
    --green: #16a34a;
    --wa: #25d366;
    --orange: #f97316;
    --red: #ef4444;
    --ink: #111827;
    --muted: #6b7280;
    --line: #e5e7eb;
    --bg: #f8fafc;
    --card: #ffffff;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,.12);
    --nav-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.45;
    /* Espace bas pour dégager la barre de navigation fixe (+ marge de confort). */
    padding-bottom: calc(var(--nav-h) + 24px + env(safe-area-inset-bottom));
    overflow-x: clip;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  img { display: block; max-width: 100%; }
  .container { max-width: 720px; margin: 0 auto; }

  /* ---------- En-tête ---------- */
  header {
    position: sticky; top: 0; z-index: 40;
    background: var(--card);
    border-bottom: 1px solid var(--line);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 14px 16px 10px;
  }
  .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; transition: transform .2s ease, opacity .2s ease; }
  .logo .dot { color: var(--green); }
  .logo.logo-hold { transform: scale(.94); opacity: .6; }
  /* Porte d'accès admin (saisie du mot de passe après l'appui long) */
  .admin-gate { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
  .admin-gate.show { display: flex; }
  .admin-gate-box { background: var(--card); border-radius: var(--radius); padding: 22px; width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .admin-gate-box h3 { margin: 0 0 4px; font-size: 18px; color: var(--ink); }
  .admin-gate-box p { margin: 0 0 14px; font-size: 13px; color: var(--muted); }
  .admin-gate-box input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 16px; box-sizing: border-box; color: var(--ink); background: var(--bg); }
  .admin-gate-box input.err { border-color: #dc2626; animation: agShake .3s; }
  .admin-gate-err { color: #dc2626; font-size: 12px; min-height: 15px; margin: 6px 2px 0; }
  .admin-gate-actions { display: flex; gap: 10px; margin-top: 14px; }
  .admin-gate-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; }
  .ag-cancel { background: var(--bg); color: var(--ink); border: 1px solid var(--line) !important; }
  .ag-ok { background: var(--green); color: #fff; }
  .ag-ok:disabled { opacity: .6; cursor: default; }
  @keyframes agShake { 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  .logo span.b { color: var(--ink); }
  .header-actions { display: flex; gap: 10px; }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card);
    display: grid; place-items: center; color: var(--ink);
    position: relative; transition: background .15s;
  }
  .icon-btn:active { background: #f1f5f9; }
  .avatar { width: 30px; height: 30px; border-radius: 999px; background: var(--blue); color: #fff;
    display: grid; place-items: center; font-size: 14px; font-weight: 800; }
  .badge-count {
    position: absolute; top: -6px; right: -6px;
    min-width: 18px; height: 18px; padding: 0 5px;
    background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 999px; display: grid; place-items: center;
    border: 2px solid var(--card);
  }
  .badge-count:empty, .badge-count[data-count="0"] { display: none; }

  /* ---------- Recherche ---------- */
  .search-wrap { padding: 4px 16px 14px; }
  .search { display: flex; gap: 8px; }
  .search input {
    flex: 1; height: 48px; border: 1px solid var(--line); border-radius: 12px;
    padding: 0 16px; font-size: 16px; background: var(--bg); color: var(--ink);
    outline: none; transition: border-color .15s, background .15s;
  }
  .search input:focus { border-color: var(--blue); background: #fff; }
  .search button {
    width: 56px; height: 48px; border-radius: 12px; background: var(--blue);
    color: #fff; display: grid; place-items: center; transition: filter .15s;
  }
  .search button:active { filter: brightness(.92); }

  /* ---------- Catégories ---------- */
  .cats { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 14px; scrollbar-width: none; }
  .cats::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; padding: 8px 16px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--card);
    font-size: 14px; font-weight: 600; color: var(--muted); white-space: nowrap;
    transition: all .15s;
  }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ---------- Vues ---------- */
  .view { display: none; padding: 4px 12px 24px; }
  .view.active { display: block; }
  .view-title { font-size: 18px; font-weight: 800; padding: 8px 4px 14px; }

  /* ---------- Grille produits ---------- */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column; position: relative;
  }
  .card-media {
    position: relative; aspect-ratio: 4 / 3; background: linear-gradient(135deg,#f1f5f9,#e2e8f0);
    display: grid; place-items: center;
  }
  .card-media svg { width: 42%; height: 66%; opacity: .85; }
  .card-media img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .tag {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    font-size: 11px; font-weight: 800; color: #fff; padding: 4px 9px; border-radius: 8px;
    letter-spacing: .3px;
  }
  .tag.hot { background: var(--orange); }
  .tag.promo { background: var(--red); }
  .tag.out { background: var(--muted); }
  .card-out { opacity: .7; }
  .fav-btn {
    position: absolute; top: 8px; right: 8px; z-index: 2;
    width: 34px; height: 34px; border-radius: 999px; background: rgba(255,255,255,.92);
    display: grid; place-items: center; box-shadow: var(--shadow); color: var(--muted);
    transition: transform .12s, color .15s;
  }
  .fav-btn:active { transform: scale(.9); }
  .fav-btn.on { color: var(--red); }
  .card-body { padding: 10px; display: flex; flex-direction: column; gap: 4px; }
  .brand { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; }
  .name { font-size: 14px; font-weight: 800; color: var(--blue); line-height: 1.25;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .stock { font-size: 12px; color: var(--orange); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .stock.out { color: var(--muted); }
  .stock .ic-dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; }
  .price-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
  .price-wrap { display: flex; flex-direction: column; min-width: 0; gap: 1px; }
  .add-mini { align-self: center; width: 34px; height: 34px; flex: 0 0 auto;
    border-radius: 999px; background: var(--blue); color: #fff; display: grid; place-items: center; transition: filter .15s; }
  .add-mini:active { filter: brightness(1.15); }
  .price { font-size: 16px; font-weight: 800; color: var(--ink); white-space: nowrap; }
  .price-old { font-size: 12px; color: var(--muted); text-decoration: line-through; white-space: nowrap; }
  .add-btn {
    margin-top: auto; height: 42px; border-radius: 10px; background: var(--ink); color: #fff;
    font-size: 13px; font-weight: 700; letter-spacing: .3px; transition: filter .15s;
    display: grid; place-items: center;
  }
  .add-btn:active { filter: brightness(1.6); }
  .add-btn[disabled] { background: #cbd5e1; color: #fff; cursor: not-allowed; }
  .order-btn {
    margin-top: auto; height: 42px; border-radius: 10px; background: var(--green); color: #fff;
    font-size: 13px; font-weight: 700; letter-spacing: .3px; transition: filter .15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .order-btn:active { filter: brightness(.95); }
  .order-btn[disabled] { background: #cbd5e1; color: #fff; cursor: not-allowed; }

  /* ---------- État vide ---------- */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty svg { width: 64px; height: 64px; opacity: .35; margin-bottom: 14px; }
  .empty p { font-size: 15px; }
  /* Centre de notifications */
  #notif-list { display: flex; flex-direction: column; gap: 8px; padding: 2px 2px 20px; }
  .notif-item { display: flex; gap: 12px; align-items: flex-start; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px 12px 12px 14px; position: relative; }
  .notif-item.unread { border-color: var(--green); background: color-mix(in srgb, var(--green) 6%, var(--card)); }
  .notif-item.unread::before { content: ""; position: absolute; left: 5px; top: 16px; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .notif-ic { font-size: 20px; line-height: 1.2; flex: 0 0 auto; }
  .notif-main { flex: 1 1 auto; min-width: 0; }
  .notif-title { font-weight: 700; font-size: 14px; color: var(--ink); }
  .notif-msg { font-size: 13px; color: var(--ink); opacity: .85; margin-top: 2px; word-wrap: break-word; }
  .notif-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .notif-del { flex: 0 0 auto; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 8px; }
  .notif-del:hover { background: var(--bg); color: var(--ink); }

  /* ---------- Panier ---------- */
  .cart-item {
    display: flex; gap: 12px; padding: 12px; background: var(--card);
    border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 10px;
  }
  .cart-thumb { width: 64px; height: 64px; border-radius: 10px; flex: 0 0 auto;
    background: linear-gradient(135deg,#f1f5f9,#e2e8f0); display: grid; place-items: center; }
  .cart-thumb svg { width: 60%; height: 60%; opacity: .8; }
  .cart-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .cart-info { flex: 1; min-width: 0; }
  .cart-info .name { font-size: 14px; }
  .cart-info .price { font-size: 14px; }
  .qty { display: inline-flex; align-items: center; gap: 0; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-top: 6px; }
  .qty button { width: 30px; height: 30px; font-size: 18px; font-weight: 700; color: var(--ink); display: grid; place-items: center; }
  .qty button:active { background: #f1f5f9; }
  .qty span { min-width: 30px; text-align: center; font-weight: 700; font-size: 14px; }
  .cart-remove { color: var(--muted); align-self: flex-start; padding: 4px; }
  .cart-summary {
    position: sticky; bottom: 12px; margin-top: 16px; background: var(--card);
    border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-lg);
  }
  .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: var(--muted); }
  .summary-row.total { font-size: 18px; font-weight: 800; color: var(--ink); margin: 10px 0 14px; }
  .btn-primary {
    width: 100%; height: 52px; border-radius: 12px; background: var(--wa); color: #fff;
    font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-primary:active { filter: brightness(.95); }

  /* ---------- Compte ---------- */
  .account-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
  .account-card h3 { font-size: 15px; margin-bottom: 6px; }
  .account-card p { font-size: 14px; color: var(--muted); }
  .account-card a { color: var(--blue); font-weight: 600; text-decoration: none; }
  .pf-hint { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .pf-line { font-size: 15px !important; color: var(--ink) !important; margin: 4px 0; }
  .pf-field { margin-bottom: 14px; }
  .pf-field label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
  .pf-field input, .pf-field select { width: 100%; height: 48px; border: 1px solid var(--line); border-radius: 12px;
    padding: 0 14px; font-size: 16px; background: var(--bg); color: var(--ink); outline: none; }
  .pf-field input:focus, .pf-field select:focus { border-color: var(--blue); background: #fff; }
  .pf-phone { display: flex; align-items: stretch; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--bg); }
  .pf-phone span { display: flex; align-items: center; padding: 0 14px; font-weight: 700; color: var(--muted); border-right: 1px solid var(--line); background: #eef2f7; }
  .pf-phone input { flex: 1; height: 48px; border: none; background: transparent; padding: 0 14px; font-size: 16px; outline: none; letter-spacing: 1px; }
  .pf-save { width: 100%; height: 50px; margin-top: 4px; }
  .btn-line-pf { margin-top: 12px; height: 42px; padding: 0 16px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--card); color: var(--ink); font-weight: 700; font-size: 14px; }

  /* ---------- Boutons flottants ---------- */
  .fab {
    position: fixed; width: 54px; height: 54px; border-radius: 999px; z-index: 45;
    display: grid; place-items: center; box-shadow: var(--shadow-lg); color: #fff;
    bottom: calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));
  }
  .fab-wa { left: 16px; background: var(--wa); }
  .fab-top { right: 16px; background: var(--ink); opacity: 0; pointer-events: none; transform: translateY(8px); transition: all .2s; }
  .fab-top.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

  /* ---------- Navigation basse ---------- */
  nav.bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    height: calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    background: var(--card); border-top: 1px solid var(--line);
    display: flex;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 11px; font-weight: 600; color: var(--muted); position: relative;
  }
  .nav-btn.active { color: var(--blue); }
  .nav-btn svg { width: 24px; height: 24px; }
  .nav-btn .badge-count { top: 4px; right: 50%; margin-right: -22px; }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; left: 50%; transform: translateX(-50%) translateY(20px);
    bottom: calc(var(--nav-h) + 90px); z-index: 60;
    background: var(--ink); color: #fff; padding: 12px 18px; border-radius: 12px;
    font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg);
    opacity: 0; pointer-events: none; transition: all .25s; max-width: 90%; text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Fiche produit ---------- */
  .card { cursor: pointer; }
  #view-produit { padding: 8px 12px 24px; }
  .pd-back { display: flex; align-items: center; gap: 4px; font-size: 15px; font-weight: 600; color: var(--ink); padding: 8px 4px; }
  .pd-gallery { margin-bottom: 16px; }
  .pd-main { position: relative; aspect-ratio: 1 / 1; background: linear-gradient(135deg,#f1f5f9,#e2e8f0);
    border-radius: var(--radius); overflow: hidden; display: grid; place-items: center; }
  .pd-main img { width: 100%; height: 100%; object-fit: cover; }
  .pd-main-ph svg { width: 50%; height: 50%; opacity: .85; }
  .pd-main .tag { top: 12px; left: 12px; }
  .pd-thumbs { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; scrollbar-width: none; }
  .pd-thumbs::-webkit-scrollbar { display: none; }
  .pd-thumb { flex: 0 0 auto; width: 60px; height: 60px; border-radius: 10px; overflow: hidden;
    border: 2px solid transparent; background: #f1f5f9; padding: 0; }
  .pd-thumb.active { border-color: var(--blue); }
  .pd-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .pd-name { font-size: 22px; font-weight: 800; line-height: 1.2; margin: 2px 0 6px; }
  .pd-rating { font-size: 14px; color: #f59e0b; font-weight: 700; margin-bottom: 8px; }
  .pd-rating span { color: var(--muted); font-weight: 500; }
  .pd-price-row { display: flex; align-items: baseline; gap: 10px; margin: 6px 0; }
  .pd-price { font-size: 24px; font-weight: 800; }
  .pd-old { font-size: 15px; color: var(--muted); text-decoration: line-through; }
  .pd-desc { font-size: 14px; color: #374151; line-height: 1.6; margin-top: 14px; }
  .vgroup { margin-top: 16px; }
  .vlabel { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
  .vchips { display: flex; flex-wrap: nowrap; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .vchips::-webkit-scrollbar { display: none; }
  .vchip { flex: 0 0 auto; }
  .vchip { padding: 9px 16px; border-radius: 10px; border: 1.5px solid var(--line); background: var(--card);
    font-size: 14px; font-weight: 600; color: var(--ink); }
  .vchip.active { border-color: var(--blue); color: var(--blue); background: #eff6ff; }
  .vchip.off { color: #cbd5e1; text-decoration: line-through; cursor: not-allowed; }
  .pd-actions { display: flex; gap: 10px; align-items: stretch; margin-top: 22px; }
  .pd-add { flex: 1; height: 52px; font-size: 15px; }
  .pd-fav { width: 52px; border: 1.5px solid var(--line); border-radius: 12px; display: grid; place-items: center;
    color: var(--muted); background: var(--card); transition: color .15s, border-color .15s; }
  .pd-fav.on { color: var(--red); border-color: var(--red); }
  .cart-variant { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* ---------- Tunnel de commande ---------- */
  #view-checkout { padding: 8px 12px 24px; }
  .ck-title { font-size: 20px; font-weight: 800; margin: 6px 4px 14px; }
  .ck-identity { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px; }
  .ck-id-av { width: 44px; height: 44px; border-radius: 999px; background: var(--blue); color: #fff; flex: 0 0 auto;
    display: grid; place-items: center; font-size: 18px; font-weight: 800; }
  .ck-id-name { font-size: 15px; font-weight: 800; color: var(--ink); }
  .ck-id-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ck-id-edit { flex: 0 0 auto; background: var(--bg); border: 1px solid var(--line); color: var(--ink);
    border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 700; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 0 14px; height: 48px;
    font-size: 16px; font-family: inherit; background: var(--bg); color: var(--ink); outline: none;
  }
  .field textarea { height: auto; padding: 12px 14px; min-height: 70px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue); background: #fff; }
  .field input.invalid { border-color: var(--red); background: #fef2f2; }

  .pay-options { display: flex; flex-direction: column; gap: 10px; }
  .pay-option {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%;
    border: 1.5px solid var(--line); border-radius: 12px; padding: 14px 16px; background: var(--card);
    font-size: 15px; font-weight: 600; color: var(--ink); text-align: left;
  }
  .pay-option.selected { border-color: var(--blue); background: #eff6ff; }
  .pay-option.disabled { opacity: .65; cursor: not-allowed; }
  .pay-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: #dcfce7; color: var(--green); }
  .pay-tag.soon { background: #fef3c7; color: #b45309; }

  #ck-error { display: none; background: #fef2f2; color: var(--red); border: 1px solid #fecaca;
    border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 600; margin: 6px 0 14px; }
  #ck-error.show { display: block; }

  .btn-ghost { width: 100%; height: 50px; border-radius: 12px; background: var(--card); color: var(--ink);
    border: 1.5px solid var(--line); font-size: 15px; font-weight: 700; margin-top: 10px; }

  /* ---------- Confirmation ---------- */
  .confirm { text-align: center; padding: 28px 16px; }
  .confirm-icon { width: 72px; height: 72px; border-radius: 999px; background: var(--green); color: #fff;
    font-size: 40px; display: grid; place-items: center; margin: 0 auto 16px; }
  .confirm h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .confirm p { color: var(--muted); margin-bottom: 18px; }
  .confirm-ref { background: var(--bg); border: 1px dashed var(--line); border-radius: 14px; padding: 16px;
    font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .confirm-ref strong { display: inline-block; margin-top: 4px; font-size: 22px; color: var(--ink); letter-spacing: 1px; }
  .confirm-line { font-size: 15px; margin-bottom: 8px; }
  .confirm-wa { margin-top: 18px; }

  /* ---------- Mes commandes ---------- */
  .mo-list { display: flex; flex-direction: column; gap: 10px; }
  .mo-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%;
    text-align: left; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px; cursor: pointer; }
  .mo-row:active { background: #f8fafc; }
  .mo-ref { font-weight: 800; font-size: 15px; }
  .mo-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .mo-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .mo-total { font-weight: 800; font-size: 15px; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; display: inline-block; white-space: nowrap; }
  .status-badge.s-en_attente { background: #fef9c3; color: #854d0e; }
  .status-badge.s-confirmee { background: #dbeafe; color: #1e40af; }
  .status-badge.s-en_livraison { background: #e0e7ff; color: #4338ca; }
  .status-badge.s-livree { background: #dcfce7; color: #166534; }
  .status-badge.s-annulee { background: #fee2e2; color: #991b1b; }
  .oi-row { display: flex; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .muted { color: var(--muted); }
  .mo-totals { margin-top: 12px; }
  .mo-totals > div { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 4px; }
  .mo-total-line { font-size: 17px !important; font-weight: 800; color: var(--ink) !important; margin-top: 6px; }
  .timeline { display: flex; flex-direction: column; gap: 8px; }
  .tl-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }

  /* ============ INTERFACE DESKTOP PREMIUM (> 1200px) ============
     Layout 100% indépendant (#desktop-app). En dessous de 1201px il est masqué
     et la version mobile reste STRICTEMENT identique (aucune règle ne l'affecte). */
  #desktop-app { display: none; }

  @media (min-width: 1201px) {
    body > header, body > main.container, nav.bottom, .fab { display: none !important; }
    body { overflow: hidden; }

    #desktop-app { display: grid; grid-template-rows: auto 1fr; height: 100vh; background: var(--bg); color: var(--ink); }

    /* ---- Header fixe ---- */
    #dk-header { display: flex; align-items: center; gap: 22px; padding: 0 28px; height: 68px;
      background: var(--card); border-bottom: 1px solid var(--line); z-index: 20; }
    .dk-logo { font-size: 24px; font-weight: 800; letter-spacing: -.5px; cursor: pointer; white-space: nowrap; }
    .dk-logo .dot { color: var(--green); }
    #dk-search { flex: 1 1 auto; max-width: 720px; display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 0 14px; height: 46px; }
    #dk-search input { flex: 1; border: none; background: none; outline: none; font-size: 15px; color: var(--ink); }
    #dk-search svg { color: var(--muted); flex: 0 0 auto; }
    .dk-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .dk-ic { position: relative; width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line);
      background: var(--card); display: grid; place-items: center; color: var(--ink); cursor: pointer; transition: background .15s, border-color .15s; }
    .dk-ic:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .dk-ic.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .dk-badge { position: absolute; top: -5px; right: -5px; min-width: 18px; height: 18px; padding: 0 5px; box-sizing: border-box;
      background: var(--red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 999px; display: grid; place-items: center; border: 2px solid var(--card); }
    .dk-badge:empty, .dk-badge[data-count="0"] { display: none; }
    .dk-avatar-sm { width: 30px; height: 30px; border-radius: 999px; background: var(--blue); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 14px; }

    /* ---- Corps : 3 colonnes ---- */
    #dk-body { display: grid; grid-template-columns: 250px 1fr 384px; min-height: 0; }

    /* ---- Sidebar filtres (fixe, scroll propre) ---- */
    #dk-sidebar { border-right: 1px solid var(--line); background: var(--card); overflow-y: auto; padding: 20px 18px 40px; }
    .dk-fgroup { margin-bottom: 22px; }
    .dk-fgroup h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 8px; }
    .dk-fopt { display: flex; align-items: center; gap: 9px; padding: 6px 4px; font-size: 14px; cursor: pointer; border-radius: 8px; color: var(--ink); }
    .dk-fopt:hover { background: var(--bg); }
    .dk-fopt input { accent-color: var(--blue); width: 16px; height: 16px; flex: 0 0 auto; }
    .dk-fopt .cnt { margin-left: auto; font-size: 12px; color: var(--muted); }
    .dk-price-val { font-size: 13px; color: var(--ink); font-weight: 700; margin-top: 8px; }
    #dk-price { width: 100%; accent-color: var(--blue); margin-top: 6px; }
    .dk-reset { margin-top: 8px; width: 100%; height: 40px; border: 1px solid var(--line); background: var(--card); border-radius: 10px; font-weight: 700; color: var(--muted); cursor: pointer; }
    .dk-reset:hover { color: var(--ink); border-color: var(--ink); }

    /* ---- Catalogue (seul à défiler) ---- */
    #dk-catalog { overflow-y: auto; padding: 22px 24px 60px; }
    .dk-cat-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .dk-cat-title { font-size: 20px; font-weight: 800; }
    .dk-cat-count { font-size: 13px; color: var(--muted); }
    #dk-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    @media (min-width: 1800px) { #dk-grid { grid-template-columns: repeat(6, 1fr); } }
    @media (min-width: 2300px) { #dk-grid { grid-template-columns: repeat(7, 1fr); } }

    /* ---- Carte produit desktop ---- */
    .dk-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; position: relative;
      display: flex; flex-direction: column; cursor: pointer; transition: transform .16s ease, box-shadow .2s ease, border-color .16s; }
    .dk-card:hover { transform: translateY(-4px); box-shadow: 0 16px 30px rgba(2,6,23,.12); border-color: transparent; }
    .dk-card.sel { box-shadow: 0 0 0 2px var(--blue) inset; }
    .dk-cmedia { position: relative; aspect-ratio: 1/1; background: linear-gradient(135deg,#f1f5f9,#e2e8f0); overflow: hidden; }
    .dk-cmedia img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform .3s ease; }
    .dk-card:hover .dk-cmedia img { transform: scale(1.05); }
    .dk-cmedia svg { position: absolute; inset: 0; margin: auto; width: 46%; height: 46%; opacity: .85; }
    .dk-cbadge { position: absolute; top: 10px; left: 10px; z-index: 2; font-size: 11px; font-weight: 800; color: #fff; padding: 4px 9px; border-radius: 8px; }
    .dk-cbadge.promo { background: var(--red); } .dk-cbadge.hot { background: var(--orange); } .dk-cbadge.out { background: var(--muted); }
    .dk-cfav { position: absolute; top: 8px; right: 8px; z-index: 2; width: 34px; height: 34px; border-radius: 999px; border: none;
      background: rgba(255,255,255,.94); display: grid; place-items: center; color: var(--muted); box-shadow: 0 3px 8px rgba(0,0,0,.12); cursor: pointer; transition: transform .12s, color .15s; }
    .dk-cfav:hover { transform: scale(1.1); } .dk-cfav.on { color: var(--red); }
    .dk-ccmp { position: absolute; bottom: 8px; right: 8px; z-index: 2; display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.94);
      border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--muted); box-shadow: 0 3px 8px rgba(0,0,0,.12); cursor: pointer; }
    .dk-ccmp input { accent-color: var(--blue); margin: 0; }
    .dk-cbody { padding: 12px 12px 14px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .dk-cseller { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
    .dk-cname { font-size: 14px; font-weight: 800; color: var(--ink); line-height: 1.25; min-height: 35px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .dk-crating { font-size: 12px; color: #f59e0b; font-weight: 700; }
    .dk-crating span { color: var(--muted); font-weight: 500; }
    .dk-cprices { display: flex; align-items: baseline; gap: 7px; margin-top: 2px; }
    .dk-cprice { font-size: 17px; font-weight: 800; color: var(--ink); }
    .dk-cold { font-size: 12px; color: var(--muted); text-decoration: line-through; }
    .dk-cadd { margin-top: 10px; height: 40px; border: none; border-radius: 10px; background: var(--blue); color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 7px; cursor: pointer; transition: filter .15s; }
    .dk-cadd:hover { filter: brightness(1.08); }
    .dk-cadd-off { background: #cbd5e1; cursor: not-allowed; }

    /* ---- Smart Panel (fixe, animé) ---- */
    #dk-smart { border-left: 1px solid var(--line); background: var(--card); overflow: hidden; }
    #dk-smart-scroll { height: 100%; overflow-y: auto; }
    .dk-panel { padding: 22px 20px 44px; animation: dkPanelIn .3s cubic-bezier(.22,.61,.36,1); }
    @keyframes dkPanelIn { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: translateX(0); } }
    .dk-ptitle { font-size: 17px; font-weight: 800; margin: 0 0 14px; }
    .dk-back { font-size: 13px; color: var(--blue); font-weight: 700; cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 12px; display: inline-flex; align-items: center; gap: 4px; }

    .dk-prof-head { text-align: center; padding: 6px 0 12px; }
    .dk-prof-av { width: 74px; height: 74px; border-radius: 999px; background: var(--blue); color: #fff; display: grid; place-items: center; font-size: 30px; font-weight: 800; margin: 0 auto 10px; }
    .dk-prof-name { font-size: 18px; font-weight: 800; }
    .dk-prof-city { font-size: 13px; color: var(--muted); }
    .dk-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
    .dk-stat { background: var(--bg); border-radius: 14px; padding: 14px; text-align: center; }
    .dk-stat b { font-size: 22px; display: block; color: var(--ink); }
    .dk-stat span { font-size: 12px; color: var(--muted); }
    .dk-sec { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 18px 0 8px; }
    .dk-mini { display: flex; gap: 10px; align-items: center; padding: 8px; border-radius: 12px; cursor: pointer; }
    .dk-mini:hover { background: var(--bg); }
    .dk-mini-img { width: 46px; height: 46px; border-radius: 10px; overflow: hidden; background: linear-gradient(135deg,#f1f5f9,#e2e8f0); flex: 0 0 auto; position: relative; }
    .dk-mini-img img { width: 100%; height: 100%; object-fit: cover; }
    .dk-mini-img svg { position:absolute; inset:0; margin:auto; width:55%; height:55%; opacity:.7; }
    .dk-mini-info { min-width: 0; flex: 1; }
    .dk-mini-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
    .dk-mini-sub { font-size: 12px; color: var(--muted); }
    .dk-mini-price { font-size: 13px; color: var(--ink); font-weight: 800; }
    .dk-mini-x { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; }
    .dk-mini-x:hover { color: var(--red); }
    .dk-promo { background: linear-gradient(120deg,#1e3a8a,#2563eb); color: #fff; border-radius: 16px; padding: 16px; margin-top: 8px; }
    .dk-promo b { font-size: 15px; } .dk-promo p { font-size: 13px; opacity: .9; margin: 4px 0 0; }

    .dk-pp-main { position: relative; aspect-ratio: 1/1; border-radius: 16px; overflow: hidden; background: linear-gradient(135deg,#f1f5f9,#e2e8f0); }
    .dk-pp-main img { width: 100%; height: 100%; object-fit: cover; }
    .dk-pp-main svg { position:absolute; inset:0; margin:auto; width:46%; height:46%; opacity:.85; }
    .dk-pp-thumbs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .dk-pp-thumb { width: 54px; height: 54px; border-radius: 10px; overflow: hidden; border: 2px solid transparent; cursor: pointer; background: #eef2f7; }
    .dk-pp-thumb.active { border-color: var(--blue); }
    .dk-pp-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .dk-pp-seller { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; margin-top: 14px; }
    .dk-pp-name { font-size: 20px; font-weight: 800; margin: 4px 0; }
    .dk-pp-prices { display: flex; align-items: center; gap: 10px; margin: 8px 0; flex-wrap: wrap; }
    .dk-pp-price { font-size: 26px; font-weight: 800; }
    .dk-pp-old { font-size: 15px; color: var(--muted); text-decoration: line-through; }
    .dk-pp-pbadge { background: var(--red); color: #fff; font-size: 12px; font-weight: 800; padding: 3px 9px; border-radius: 8px; }
    .dk-pp-desc { font-size: 14px; color: var(--ink); opacity: .85; line-height: 1.5; margin: 8px 0; }
    .dk-pp-spec { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
    .dk-pp-spec span:first-child { color: var(--muted); }
    .dk-pp-spec span:last-child { font-weight: 700; text-align: right; }
    .dk-pp-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    .dk-btn { height: 46px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: filter .15s, transform .1s; }
    .dk-btn:active { transform: scale(.99); } .dk-btn:hover { filter: brightness(1.06); }
    .dk-btn-primary { background: var(--blue); color: #fff; }
    .dk-btn-buy { background: var(--ink); color: #fff; }
    .dk-btn-wa { background: #25d366; color: #fff; }
    .dk-btn-ghost { background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
    .dk-btn[disabled] { background: #cbd5e1; color: #fff; cursor: not-allowed; }
    .dk-two { display: flex; gap: 10px; } .dk-two .dk-btn { flex: 1; }

    .dk-empty { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 14px; }
    .dk-empty svg { width: 54px; height: 54px; opacity: .35; margin-bottom: 10px; }
    .dk-total { display: flex; justify-content: space-between; font-size: 17px; font-weight: 800; margin: 14px 2px; }

    .dk-cmp-bar { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-radius: 12px; padding: 8px 12px; margin-bottom: 12px; font-size: 13px; }
    .dk-cmp-clear { background: none; border: none; color: var(--red); font-weight: 700; cursor: pointer; }
    .dk-cmp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .dk-cmp-table th, .dk-cmp-table td { padding: 9px 8px; border-bottom: 1px solid var(--line); text-align: center; vertical-align: top; }
    .dk-cmp-table td.feat, .dk-cmp-table th.feat { text-align: left; color: var(--muted); font-weight: 600; white-space: nowrap; }
    .dk-cmp-table thead img { width: 100%; max-width: 84px; border-radius: 8px; aspect-ratio: 1/1; object-fit: cover; margin: 0 auto 4px; display: block; }
    .dk-cmp-table thead .nm { font-size: 12px; font-weight: 700; }
    .dk-notif-unread { border-left: 3px solid var(--green); }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-top">
      <div class="logo" id="logo"><span class="b">portable</span><span class="dot">.sn</span></div>
      <div class="header-actions">
        <button class="icon-btn" data-go="favoris" aria-label="Favoris">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6z"/></svg>
          <span class="badge-count" id="fav-badge"></span>
        </button>
        <button class="icon-btn" id="account-btn" data-go="compte" aria-label="Profil">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search">
        <input id="search" type="search" placeholder="Je recherche..." autocomplete="off" />
        <button id="search-btn" aria-label="Rechercher">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
      </div>
    </div>
    <div class="cats" id="cats"></div>
  </div>
</header>

<main class="container">
  <!-- Vue Accueil -->
  <section class="view active" id="view-accueil">
    <div class="grid" id="grid"></div>
    <div class="empty" id="grid-empty" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <p>Aucun produit ne correspond à ta recherche.</p>
    </div>
  </section>

  <!-- Vue Fiche produit (remplie dynamiquement par renderProduct) -->
  <section class="view" id="view-produit"></section>

  <!-- Vue Commande : formulaire puis confirmation (remplie dynamiquement) -->
  <section class="view" id="view-checkout"></section>

  <!-- Vue Panier -->
  <section class="view" id="view-panier">
    <h2 class="view-title">Mon panier</h2>
    <div id="cart-list"></div>
    <div class="empty" id="cart-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <p>Ton panier est vide.</p>
    </div>
  </section>

  <!-- Vue Favoris -->
  <section class="view" id="view-favoris">
    <h2 class="view-title">Mes favoris</h2>
    <div class="grid" id="fav-grid"></div>
    <div class="empty" id="fav-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6z"/></svg>
      <p>Aucun favori pour l'instant.</p>
    </div>
  </section>

  <!-- Vue Compte -->
  <section class="view" id="view-compte">
    <h2 class="view-title">Mon profil</h2>
    <div id="profil-body"></div>
    <div class="account-card">
      <h3>Nous contacter</h3>
      <p>WhatsApp / Téléphone : <a id="contact-phone" href="#">+221 …</a></p>
      <p>Du lundi au samedi, 9h – 20h.</p>
    </div>
  </section>

  <!-- Vue Mes commandes (remplie dynamiquement) -->
  <section class="view" id="view-mescommandes"></section>

  <!-- Vue Notifications — boîte de réception interne (alertes enregistrées en base) -->
  <section class="view" id="view-notifications">
    <h2 class="view-title">Notifications</h2>
    <div id="notif-list"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  "use strict";

  /* ===== Configuration Supabase ===== */
  const SUPABASE_URL = "https://uxvalsjtnuhbauerylro.supabase.co";
  const SUPABASE_KEY = "sb_publishable_fSoIxKIDRGtWHw-u7h2H4g_gIeaO5Yk"; // clé publique (anon)
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ===== Données chargées depuis Supabase ===== */
  let WHATSAPP   = "221787934848"; // valeur par défaut, surchargée par settings
  let PRODUCTS   = [];             // catalogue (products + variantes + images)
  let VARIANTS   = {};             // index variantId -> { ...variante, product }
  let CATEGORIES = ["Tous"];       // puces de catégories
  let ZONES      = [];             // zones de livraison (pour le tunnel de commande, étape 4)
  let SETTINGS   = {};             // paramètres globaux (settings)
  let PROFILE    = load("psn_profile", null); // profil client local (inscription)
  let editingProfile = false;
  let authMode   = "login";     // 'login' | 'signup' (écran compte non connecté)
  let authBusy   = false;       // anti double-soumission connexion/inscription
  let pendingCheckout = false;  // commande à reprendre après création de compte / connexion
  let MY_ORDERS  = [];          // commandes du client connecté
  let myOrderView = "list";     // 'list' | 'detail'
  let currentOrder = null;
  const ORDER_STATUS_LABELS = { en_attente: "En attente", confirmee: "Confirmée", en_livraison: "En livraison", livree: "Livrée", annulee: "Annulée" };
  const statusLabel = (v) => ORDER_STATUS_LABELS[v] || v;

  /* ===== Régions et quartiers du Sénégal ===== */
  const REGIONS = ["Dakar", "Thiès", "Saint-Louis", "Diourbel", "Louga", "Fatick", "Kaolack",
    "Kaffrine", "Tambacounda", "Kédougou", "Kolda", "Sédhiou", "Ziguinchor", "Matam"];
  const QUARTIERS = {
    "Dakar": ["Plateau", "Médina", "Fann", "Point E", "Mermoz", "Sacré-Cœur", "Liberté", "Grand Dakar",
      "HLM", "Grand Yoff", "Yoff", "Ouakam", "Ngor", "Almadies", "Parcelles Assainies", "Patte d'Oie",
      "Pikine", "Guédiawaye", "Thiaroye", "Rufisque", "Keur Massar", "Cambérène", "Hann"],
    "Thiès": ["Thiès Nord", "Thiès Sud", "Mbour", "Saly", "Tivaouane", "Pout", "Khombole", "Joal-Fadiouth"],
    "Saint-Louis": ["Sor", "Île Nord", "Guet Ndar", "Pikine (SL)", "Richard-Toll", "Dagana", "Podor"],
    "Diourbel": ["Diourbel", "Touba", "Mbacké", "Bambey"],
    "Louga": ["Louga", "Linguère", "Kébémer", "Dahra"],
    "Fatick": ["Fatick", "Foundiougne", "Gossas", "Sokone", "Diofior"],
    "Kaolack": ["Kaolack", "Médina Baye", "Nioro du Rip", "Guinguinéo"],
    "Kaffrine": ["Kaffrine", "Birkilane", "Koungheul", "Malem Hodar"],
    "Tambacounda": ["Tambacounda", "Bakel", "Goudiry", "Koumpentoum"],
    "Kédougou": ["Kédougou", "Salémata", "Saraya"],
    "Kolda": ["Kolda", "Vélingara", "Médina Yoro Foulah"],
    "Sédhiou": ["Sédhiou", "Bounkiling", "Goudomp"],
    "Ziguinchor": ["Ziguinchor", "Bignona", "Oussouye", "Kafountine"],
    "Matam": ["Matam", "Ourossogui", "Kanel", "Ranérou"],
  };

  /* ===== État (persisté dans localStorage) ===== */
  const store = {
    cart: load("psn_cart2", {}),  // { variantId: quantité }  (clé v2 = par variante)
    favs: load("psn_favs", []),   // [ productId, ... ]  (favoris au niveau produit)
    cat: "Tous",
    query: "",
    prevView: "accueil",          // vue d'où l'on a ouvert une fiche produit / le checkout
    detail: { pid: null, color: null, storage: null, variantId: null, img: null },
    checkout: { zoneId: null, pay: "cod" },
  };

  function load(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
    catch { return fallback; }
  }
  function save() {
    localStorage.setItem("psn_cart2", JSON.stringify(store.cart));
    localStorage.setItem("psn_favs", JSON.stringify(store.favs));
  }

  /* ===== Utilitaires ===== */
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => [...r.querySelectorAll(s)];
  const byId = (id) => PRODUCTS.find((p) => p.id === id);
  const variantById = (vid) => VARIANTS[vid];
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const fmt = (n) => n.toLocaleString("fr-FR").replace(/ | /g, " ") + " FCFA";

  // Image placeholder SVG adaptée à la catégorie — rend le fichier 100 % autonome.
  function mediaSvg(category) {
    const open = '<svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">';
    const icons = {
      "Téléphones":   '<rect x="6" y="2" width="12" height="20" rx="2.5"/><path d="M10 18h4"/>',
      "Accessoires":  '<path d="M3 14h3a2 2 0 0 0 2-2V7a4 4 0 0 1 8 0v5a2 2 0 0 0 2 2h3"/><path d="M3 14v3a3 3 0 0 0 3 3h0a2 2 0 0 0 2-2v-4M21 14v3a3 3 0 0 1-3 3h0a2 2 0 0 1-2-2v-4"/>',
      "Électronique": '<rect x="6" y="3" width="12" height="18" rx="2"/><path d="M10 3V1.5h4V3M9 8h6M9 12h6"/>',
      "Divers":       '<path d="M21 8 12 3 3 8l9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8M12 13v8"/>',
    };
    return open + (icons[category] || icons["Téléphones"]) + "</svg>";
  }
  // Exposé en global pour le repli onerror des <img>.
  window.psnPlaceholder = mediaSvg;

  // Affiche la photo du produit si fournie, sinon l'icône placeholder.
  // En cas d'URL cassée, l'<img> est remplacée automatiquement par l'icône.
  function mediaHtml(p) {
    if (p.image) {
      return `<img src="${p.image}" alt="${esc(p.brand)} ${esc(p.name)}" loading="lazy" onerror="this.outerHTML=window.psnPlaceholder('${p.category}')">`;
    }
    return mediaSvg(p.category);
  }

  /* ===== Rendu : catégories ===== */
  function renderCats() {
    const el = $("#cats");
    el.innerHTML = CATEGORIES.map((c) =>
      `<button class="chip ${c === store.cat ? "active" : ""}" data-cat="${c}">${c}</button>`
    ).join("");
  }

  /* ===== Filtrage ===== */
  function filtered() {
    const q = store.query.trim().toLowerCase();
    return PRODUCTS.filter((p) => {
      const okCat = store.cat === "Tous" || p.category === store.cat || p.brand === store.cat;
      const okQ = !q || (p.brand + " " + p.name).toLowerCase().includes(q);
      return okCat && okQ;
    });
  }

  /* ===== Carte produit ===== */
  function cardHtml(p) {
    const isFav = store.favs.includes(p.id);
    const out = p.stock <= 0;
    const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
    let tag = "";
    if (discount > 0) tag = `<span class="tag promo">-${discount}%</span>`;
    else if (p.tag === "hot") tag = `<span class="tag hot">HOT</span>`;

    const canBuy = !out && p.defaultVariantId;
    return `
      <article class="card ${out ? "card-out" : ""}" data-open="${p.id}">
        <div class="card-media">
          ${out ? '<span class="tag out">Épuisé</span>' : tag}
          <button class="fav-btn ${isFav ? "on" : ""}" data-fav="${p.id}" aria-label="Favori">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="${isFav ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6z"/></svg>
          </button>
          ${mediaHtml(p)}
        </div>
        <div class="card-body">
          <div class="name">${esc(p.name)}</div>
          <div class="price-row">
            <div class="price-wrap">
              <span class="price">${fmt(p.price)}</span>
              ${p.oldPrice ? `<span class="price-old">${fmt(p.oldPrice)}</span>` : ""}
            </div>
            ${canBuy ? `<button class="add-mini" data-add="${p.defaultVariantId}" title="Ajouter au panier" aria-label="Ajouter au panier"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>` : ""}
          </div>
        </div>
      </article>`;
  }

  /* ===== Rendu : grille accueil ===== */
  function renderGrid() {
    const items = filtered();
    const grid = $("#grid");
    grid.innerHTML = items.map(cardHtml).join("");
    $("#grid-empty").hidden = items.length > 0;
    if (window.psnDesktop) psnDesktop.onDataChange(); // rafraîchit l'UI desktop
  }

  /* ===== Rendu : favoris ===== */
  function renderFavs() {
    const items = PRODUCTS.filter((p) => store.favs.includes(p.id));
    $("#fav-grid").innerHTML = items.map(cardHtml).join("");
    $("#fav-empty").style.display = items.length ? "none" : "block";
  }

  /* ===== Rendu : panier ===== */
  function renderCart() {
    const ids = Object.keys(store.cart);
    const list = $("#cart-list");
    const empty = $("#cart-empty");

    if (!ids.length) {
      list.innerHTML = "";
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    let total = 0, count = 0;
    const rows = ids.map((vid) => {
      const v = variantById(vid); if (!v) return "";
      const p = v.product;
      const q = store.cart[vid];
      total += v.price * q; count += q;
      const variantLabel = (v.label && v.label !== "Standard") ? `<div class="cart-variant">${esc(v.label)}</div>` : "";
      return `
        <div class="cart-item">
          <div class="cart-thumb">${mediaHtml(p)}</div>
          <div class="cart-info">
            <div class="brand">${esc(p.brand)}</div>
            <div class="name">${esc(p.name)}</div>
            ${variantLabel}
            <div class="price">${fmt(v.price)}</div>
            <div class="qty">
              <button data-dec="${vid}" aria-label="Moins">−</button>
              <span>${q}</span>
              <button data-inc="${vid}" aria-label="Plus">+</button>
            </div>
          </div>
          <button class="cart-remove" data-del="${vid}" aria-label="Retirer">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          </button>
        </div>`;
    }).join("");

    list.innerHTML = rows + `
      <div class="cart-summary">
        <div class="summary-row"><span>Articles (${count})</span><span>${fmt(total)}</span></div>
        <div class="summary-row"><span>Livraison</span><span>calculée à l'étape suivante</span></div>
        <div class="summary-row total"><span>Sous-total</span><span>${fmt(total)}</span></div>
        <button class="btn-primary" data-checkout style="background:var(--ink)">
          Commander
        </button>
      </div>`;
  }

  /* ===== Badges (compteurs) ===== */
  function renderBadges() {
    const count = Object.values(store.cart).reduce((a, b) => a + b, 0);
    const cb = $("#cart-badge");
    cb.textContent = count || "";
    cb.dataset.count = count;
    const fb = $("#fav-badge");
    fb.textContent = store.favs.length || "";
    fb.dataset.count = store.favs.length;
    if (window.psnDesktop) psnDesktop.refreshBadges();
  }

  /* ===== Actions ===== */
  // Le panier est indexé par variant_id (et non par product_id).
  function addToCart(vid) {
    const v = variantById(vid);
    if (!v || v.stock <= 0) return;
    const next = (store.cart[vid] || 0) + 1;
    if (next > v.stock) { toast("Stock maximum atteint"); return; }
    store.cart[vid] = next;
    save(); renderBadges(); renderCart();
    const suffix = (v.label && v.label !== "Standard") ? ` (${v.label})` : "";
    toast(`${v.product.name}${suffix} ajouté au panier`);
  }
  // « Commander » : ajoute la variante au panier puis ouvre directement le tunnel de commande.
  function orderNow(vid) {
    const v = variantById(vid);
    if (!v || v.stock <= 0) return;
    if (!store.cart[vid]) addToCart(vid);
    openCheckout();
  }
  function changeQty(vid, delta) {
    if (!store.cart[vid]) return;
    const v = variantById(vid);
    const next = store.cart[vid] + delta;
    if (delta > 0 && v && next > v.stock) { toast("Stock maximum atteint"); return; }
    if (next <= 0) delete store.cart[vid];
    else store.cart[vid] = next;
    save(); renderBadges(); renderCart();
  }
  function removeFromCart(vid) {
    delete store.cart[vid];
    save(); renderBadges(); renderCart();
  }
  function toggleFav(pid) {
    const i = store.favs.indexOf(pid);
    if (i >= 0) store.favs.splice(i, 1);
    else { store.favs.push(pid); toast("Ajouté aux favoris"); }
    save(); renderBadges(); renderGrid(); renderFavs();
    if (isView("produit") && store.detail.pid) renderProduct();
  }

  /* ===== Tunnel de commande ===== */
  // Modes de paiement (extensible : passer "active:true" quand un paiement en ligne sera prêt)
  const PAYMENTS = [
    { id: "cod",  label: "Paiement à la livraison", active: true,  tag: "Disponible" },
    { id: "wave", label: "Wave",                    active: false, tag: "Bientôt" },
    { id: "om",   label: "Orange Money",            active: false, tag: "Bientôt" },
  ];
  const payLabel = (id) => (PAYMENTS.find((p) => p.id === id) || {}).label || id;

  function cartSubtotal() {
    return Object.keys(store.cart).reduce((s, vid) => s + (variantById(vid)?.price || 0) * store.cart[vid], 0);
  }
  function computeDelivery(subtotal, zone) {
    if (!zone) return 0;
    const thr = SETTINGS.free_delivery_threshold;
    if (thr != null && subtotal >= thr) return 0;
    return zone.fee || 0;
  }

  function openCheckout() {
    if (!Object.keys(store.cart).length) return;
    // Il faut d'abord un compte : on ne prend plus de commande "invité".
    if (!PROFILE || !PROFILE.token) {
      pendingCheckout = true;      // reprise auto après création de compte / connexion
      authMode = "signup";         // ouvre directement le formulaire d'inscription
      go("compte");
      toast("Crée ton compte pour finaliser ta commande");
      return;
    }
    store.prevView = "panier";
    const pfZone = ZONES.find((z) => z.name === PROFILE.region);
    store.checkout = { zoneId: ((pfZone || ZONES[0] || {}).id) || null, pay: "cod" };
    renderCheckout();
    go("checkout");
  }

  function renderCheckout() {
    const subtotal = cartSubtotal();
    const zone = ZONES.find((z) => z.id === store.checkout.zoneId) || ZONES[0];
    const fee = computeDelivery(subtotal, zone);
    const zoneOpts = ZONES.map((z) =>
      `<option value="${z.id}" ${z.id === (zone && zone.id) ? "selected" : ""}>${z.name}${z.fee ? " — " + fmt(z.fee) : " — Gratuit"}</option>`).join("");
    const payOpts = PAYMENTS.map((p) =>
      `<button type="button" class="pay-option ${p.id === store.checkout.pay ? "selected" : ""} ${p.active ? "" : "disabled"}"
         data-pay="${p.id}" ${p.active ? "" : "disabled"}>
         <span class="pay-name">${p.label}</span>
         <span class="pay-tag ${p.active ? "" : "soon"}">${p.tag}</span>
       </button>`).join("");

    $("#view-checkout").innerHTML = `
      <button class="pd-back" data-back aria-label="Retour">

  function updateCheckoutSummary() {
    const subtotal = cartSubtotal();
    const zone = ZONES.find((z) => z.id === Number($("#ck-zone")?.value));
    const fee = computeDelivery(subtotal, zone);
    if ($("#ck-fee")) $("#ck-fee").textContent = fee === 0 ? "Offerte" : fmt(fee);
    if ($("#ck-total")) $("#ck-total").textContent = fmt(subtotal + fee);
  }

  function selectPayment(el) {
    if (el.classList.contains("disabled")) return;
    $$(".pay-option").forEach((o) => o.classList.remove("selected"));
    el.classList.add("selected");
    store.checkout.pay = el.dataset.pay;
  }

  function ckError(msg) {
    const e = $("#ck-error");
    e.textContent = msg; e.classList.add("show");
    e.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  async function submitOrder() {
    // Sécurité : la commande exige un compte (nom + téléphone viennent du compte).
    if (!PROFILE || !PROFILE.token) return openCheckout();
    const name = (PROFILE.fullName || "").trim();
    const phone = "+221 " + (PROFILE.phone || "");
    const address = $("#ck-address").value.trim();
    const zoneId = Number($("#ck-zone").value) || null;
    const note = $("#ck-note").value.trim();
    const pay = store.checkout.pay || "cod";

    if (!zoneId) return ckError("Choisis une zone de livraison.");

    const items = Object.entries(store.cart).map(([vid, q]) => ({ variant_id: vid, quantity: q }));
    if (!items.length) return go("panier");

    const fullNote = "Mode de paiement : " + payLabel(pay) + (note ? "\n" + note : "");
    const btn = $("#submit-order");
    btn.disabled = true; const old = btn.textContent; btn.textContent = "Traitement…";
    $("#ck-error").classList.remove("show");

    try {
      const { data, error } = await sb.rpc("passer_commande", {
        p_customer_name: name,
        p_customer_phone: phone,
        p_customer_address: address || null,
        p_items: items,
        p_delivery_zone_id: zoneId,
        p_coupon_code: null,
        p_note: fullNote,
        p_channel: "web",
      });
      if (error) {                       // erreur métier renvoyée par la RPC (message FR précis)
        btn.disabled = false; btn.textContent = old;
        return ckError(error.message || "La commande a été refusée. Réessaie.");
      }
      const order = Array.isArray(data) ? data[0] : data;
      if (!order || !order.reference) {
        btn.disabled = false; btn.textContent = old;
        return ckError("Réponse inattendue du serveur. Réessaie.");
      }
      store.cart = {}; save(); renderBadges();
      renderConfirmation(order, pay);
    } catch (e) {                        // exception (réseau / serveur injoignable)
      console.error("passer_commande:", e);
      btn.disabled = false; btn.textContent = old;
      ckError("Erreur réseau : impossible de joindre le serveur. Vérifie ta connexion et réessaie.");
    }
  }

  function renderConfirmation(order, pay) {
    const ref = order.reference;
    const total = order.total ?? 0;
    const waMsg = "Bonjour " + (SETTINGS.store_name || "portable.sn") +
      `, je viens de passer la commande ${ref} (total ${fmt(total)}). Pouvez-vous me confirmer la livraison ?`;

    $("#view-checkout").innerHTML = `

        <div class="confirm-icon">✓</div>
        <h2>Commande confirmée !</h2>
        <p>Merci, ta commande a bien été enregistrée.</p>

        <div class="confirm-line">Total : <strong>${fmt(total)}</strong></div>
        <div class="confirm-line">Paiement : ${payLabel(pay)}</div>
        <a class="btn-primary confirm-wa" href="${waHref}" target="_blank" rel="noopener">

  /* ===== Profil client (inscription locale) ===== */

    const list = (QUARTIERS[region] || []).concat(["Autre"]);
    return list.map((q) => `<option ${q === selected ? "selected" : ""}>${esc(q)}</option>`).join("");
  }

  function renderProfile() {
    const body = $("#profil-body");
    if (!body) return;
    if (PROFILE && !editingProfile) {
      body.innerHTML = `
        <div class="account-card">
          <h3>${esc(PROFILE.fullName || "Mon profil")}</h3>
          <p class="pf-line">📍 ${esc(PROFILE.quartier)}, ${esc(PROFILE.region)}</p>

  function onRegionChange() {
    const region = $("#pf-region").value;
    $("#pf-quartier").innerHTML = quartierOptions(region, "");
    const a = $(".pf-autre"); if (a) a.hidden = true;
  }
  function onQuartierChange() {
    const a = $(".pf-autre"); if (a) a.hidden = $("#pf-quartier").value !== "Autre";

  async function saveProfile() {
    const name = (($("#pf-name") || {}).value || "").trim();
    const region = ($("#pf-region") || {}).value || REGIONS[0];
    let quartier = ($("#pf-quartier") || {}).value || "";
    if (quartier === "Autre") quartier = (($("#pf-quartier-autre") || {}).value || "").trim();
    if (!name) return toast("Indique ton nom complet.");
    if (!quartier) return toast("Indique ton quartier.");
    const phone = PROFILE ? PROFILE.phone : "";
    const token = PROFILE ? PROFILE.token : null;
    PROFILE = { fullName: name, region, quartier, phone, token }; // conserve le jeton
    localStorage.setItem("psn_profile", JSON.stringify(PROFILE));
    editingProfile = false;
    if (token) {
      const { error } = await sb.rpc("maj_profil_client",
        { p_token: token, p_full_name: name, p_region: region, p_quartier: quartier });
      if (error) console.error("maj_profil_client:", error);
    }
    toast("Profil enregistré ✓");
    applyProfileUI();
    renderProfile();
  }

  // Reconnaissance du client connecté (avatar dans l'en-tête).
  function applyProfileUI() {
    const btn = $("#account-btn"); if (!btn) return;
    if (PROFILE && PROFILE.fullName) {
      const initial = (PROFILE.fullName.trim().charAt(0) || "?").toUpperCase();
      btn.innerHTML = `<span class="avatar">${esc(initial)}</span>`;
      btn.setAttribute("aria-label", "Profil — " + PROFILE.fullName);

      btn.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      btn.setAttribute("aria-label", "Profil");

  function logoutProfile() {
    if (window.psnNotif) window.psnNotif.clear();

  /* ===== Mes commandes (client) ===== */
  function mcBack(target) {
    const label = target === "list" ? "Mes commandes" : "Retour au profil";
    const attr = target === "list" ? "data-mo-back" : `data-go="${target}"`;
    return `<button class="pd-back" ${attr}>

  async function loadMyOrders() {
    const view = $("#view-mescommandes"); if (!view) return;
    const head = mcBack("compte") + '<h2 class="view-title">Mes commandes</h2>';
    if (!PROFILE || !PROFILE.token) {
      view.innerHTML = head + '<div class="empty"><p>Connecte-toi avec ton compte (mot de passe) pour suivre tes commandes.</p></div>';
      return;
    }
    view.innerHTML = head + '<p class="pf-hint" style="padding:0 4px">Chargement…</p>';
    const { data, error } = await sb.rpc("mes_commandes", { p_token: PROFILE.token });
    if (error) {
      view.innerHTML = head + `<div class="empty"><p>${esc(error.message || "Impossible de charger les commandes.")}</p></div>`;
      return;
    }
    MY_ORDERS = Array.isArray(data) ? data : [];
    myOrderView = "list"; currentOrder = null;
    renderMyOrders();
  }

  function renderMyOrders() {
    const view = $("#view-mescommandes"); if (!view) return;
    if (myOrderView === "detail" && currentOrder) { view.innerHTML = myOrderDetailHtml(currentOrder); return; }
    const head = mcBack("compte") + '<h2 class="view-title">Mes commandes</h2>';
    if (!MY_ORDERS.length) {
      view.innerHTML = head + `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <p>Aucune commande pour l'instant.</p></div>`;
      return;
    }
    const rows = MY_ORDERS.map((o) => `
      <button class="mo-row" data-mo="${esc(o.id)}">
        <div><div class="mo-ref">${esc(o.reference)}</div><div class="mo-date">${new Date(o.created_at).toLocaleDateString("fr-FR")}</div></div>
        <div class="mo-right"><div class="mo-total">${fmt(o.total)}</div><span class="status-badge s-${esc(o.status)}">${statusLabel(o.status)}</span></div>
      </button>`).join("");
    view.innerHTML = head + `<div class="mo-list">${rows}</div>`;
  }

  function myOrderDetailHtml(o) {
    const items = (o.items || []).map((it) => `
      <div class="oi-row">
        <div>${esc(it.product_name)}${it.variant_label ? ` <span class="muted">· ${esc(it.variant_label)}</span>` : ""}</div>
        <div class="mo-right">${it.quantity} × ${fmt(it.unit_price)}</div>
      </div>`).join("");
    const hist = (o.history || []).map((h) => `
      <div class="tl-item"><span class="status-badge s-${esc(h.new_status)}">${statusLabel(h.new_status)}</span>
        <span class="muted">${new Date(h.created_at).toLocaleString("fr-FR")}</span></div>`).join("");
    return mcBack("list") + `
      <h2 class="view-title">${esc(o.reference)} <span class="status-badge s-${esc(o.status)}">${statusLabel(o.status)}</span></h2>
      <div class="account-card">
        <h3>Articles</h3>
        ${items || '<p class="pf-hint">—</p>'}
        <div class="mo-totals">
          <div><span>Sous-total</span><span>${fmt(o.subtotal)}</span></div>
          ${o.discount ? `<div><span>Remise</span><span>− ${fmt(o.discount)}</span></div>` : ""}
          <div><span>Livraison${o.zone ? " (" + esc(o.zone) + ")" : ""}</span><span>${o.delivery_fee ? fmt(o.delivery_fee) : "Offerte"}</span></div>
          <div class="mo-total-line"><span>Total</span><span>${fmt(o.total)}</span></div>
        </div>
      </div>
      <div class="account-card">
        <h3>Suivi de la commande</h3>
        <div class="timeline">${hist || '<p class="pf-hint">—</p>'}</div>
      </div>`;
  }

    currentOrder = MY_ORDERS.find((o) => String(o.id) === String(id)) || null;
